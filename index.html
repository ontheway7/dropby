  v1.2 - 2026.03.08  역전 버튼 위치 변경 (목적지 옆), 세로바 제거, 박스 크기 통일
  v2.0 - 2026.03.08  내 장소 기능 추가 (헤더 버튼, 자동완성 📌 저장, ⭐ 픽커)
  v2.1 - 2026.03.08  찾기 버튼 하단 고정 / 가짜 데이터 제거 (평점·리뷰·영업시간)
                     필터 섹션 제거 / 내비 버튼 개선 (카카오내비 없을 시 안내)
                     네이버 플레이스 버튼 추가 / 전화번호 실제 표시
  v2.2 - 2026.03.08  슬라이더 중언부언 텍스트 제거 → 찾기 버튼 노출
                     Pull-to-Refresh 복원 (overflow:hidden 제거)
  v2.3 - 2026.03.08  내 장소 편집 기능 추가 (루트마스터 방식)
                     PWA 설치 지원 (Base64 인라인 아이콘 + manifest + 설치 안내)
  v2.4 - 2026.03.08  PWA 배너 → 중앙 모달 팝업 / 카드 터치 → 네이버 플레이스
                     네이버 버튼 → 카카오맵 연결 (대중교통, 출발=현위치, 목적지=가게)
  v2.5 - 2026.03.08  카카오맵 연결 개선 - GPS 현위치 출발지 포함, 대중교통 길찾기 모드로 바로 진입
  v2.6 - 2026.03.08  동적 manifest 제거 → manifest.json 파일 연결 / 카테고리 강제 선택 제거
  v3.0 - 2026.03.08  직선 경로 → 카카오모빌리티 실제 도로 경로 기반으로 전면 개편
  v3.1 - 2026.03.08  경로 샘플링 거리 기준 균등 분포 / 검색 반경 경로 길이 기반 자동 조정
  v3.2 - 2026.03.08  직접 주소를 타이핑하여 내 장소로 저장할 때 이름을 띄어 쓰기를 하면 발생하는 오류 수정
  v3.3 - 2026.03.09  카테고리 개편: 편의점(CS2) 추가, 은행·ATM(BK9) 추가, 교통→역·터미널 이름 변경 및 순서 조정
  v3.4 - 2026.03.09  탐색 결과 검색을 네이버 지도에서 네이버 플레이스로 변경
  v3.4.1 - 2026.03.09  내 장소 가나다, 한글 영문 순으로 소팅
  v3.4.2 - 2026.03.09  내 장소 내보내기, 가져오기 추가
  v4.0.0 - 2026.03.10  카테고리별 서브탭 추가 (맛집/카페/주유소/편의점/마트/숙박/역터미널)
                       약국 야간 배너, 명소 category_name 필터링, 주유소 정렬 토글
  v4.0.2 - 2026.03.10  카드 표시 개선: 이탈시간 → "들르면 +N분" / 출발지 기준 시간 추가
                       탐색 반경 확장: 고정 5km → 우회시간 슬라이더 기준 동적 계산
                       HP8 category_name 필터 제거 (휴게소 0개 버그 수정)

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="가는 길에">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0f0d">
<title>가는 길에 · DropBy</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --bg: #0a0f0d;
  --surface: #121a14;
  --card: #1a241c;
  --border: #253028;
  --accent: #4ade80;
  --accent2: #fb923c;
  --accent3: #38bdf8;
  --gold: #fbbf24;
  --text: #e8f5eb;
  --muted: #5a7a60;
  --danger: #f87171;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:14px; }

/* v2.1: app을 flex column으로, 찾기 버튼 고정을 위해 구조 변경 */
.app { display:flex; flex-direction:column; height:100vh; max-width:480px; margin:0 auto; position:relative; }

/* ── HEADER ── */
.header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px 12px;
  background:var(--bg); border-bottom:1px solid var(--border);
  flex-shrink:0; z-index:10;
}
.logo { display:flex; align-items:baseline; gap:8px; }
.logo-main { font-family:'Black Han Sans',sans-serif; font-size:1.25rem; letter-spacing:1px; color:var(--accent); }
.logo-sub { font-size:0.72rem; color:var(--muted); letter-spacing:2px; font-weight:300; }
.btn-header {
  background:var(--card); border:1px solid var(--border);
  color:var(--muted); font-size:0.75rem; padding:6px 10px;
  border-radius:8px; font-family:'Noto Sans KR',sans-serif;
  cursor:pointer; transition:all 0.15s;
}
.btn-header:hover { border-color:var(--accent); color:var(--accent); }

/* ── MAP ── */
#map {
  flex:1; min-height:0; position:relative;
  background:var(--surface); cursor:pointer;
}
#map.fullscreen { position:fixed; inset:0; z-index:100; max-width:100%; cursor:default; }
.btn-map-close {
  position:absolute; top:12px; right:12px; z-index:101;
  background:rgba(10,15,13,0.88); border:1px solid var(--border);
  color:var(--text); width:36px; height:36px; border-radius:50%;
  font-size:0.9rem; cursor:pointer; display:none; align-items:center; justify-content:center;
}
#map.fullscreen .btn-map-close { display:flex; }

.map-empty {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:8px; pointer-events:none; z-index:1;
}
.map-empty.hide { display:none; }
.map-empty-icon { font-size:2.2rem; opacity:0.4; }
.map-empty-text { color:var(--muted); font-size:0.78rem; text-align:center; line-height:1.7; }

.map-stats {
  position:absolute; top:10px; left:10px; right:10px;
  background:rgba(10,15,13,0.92); backdrop-filter:blur(12px);
  border:1px solid var(--border); border-radius:14px;
  padding:10px 14px; z-index:5; display:none;
}
.map-stats.show { display:flex; gap:0; }
.mstat { flex:1; text-align:center; }
.mstat + .mstat { border-left:1px solid var(--border); }
.mstat-val { font-family:'Black Han Sans',sans-serif; font-size:1.1rem; color:var(--accent); }
.mstat-label { font-size:0.62rem; color:var(--muted); margin-top:1px; }

/* ── BOTTOM PANEL ── */
/* v2.1: 찾기 버튼 고정을 위해 bottom + cta-fixed 분리 */
.bottom-wrap {
  flex-shrink:0; display:flex; flex-direction:column;
  background:var(--bg); border-top:1px solid var(--border);
  position:relative; z-index:25;
}
.bottom {
  overflow-y:auto; max-height:48vh;
  -webkit-overflow-scrolling:touch;
}
.handle { display:flex; justify-content:center; padding:8px; }
.handle-bar { width:32px; height:3px; background:var(--border); border-radius:2px; }

/* v2.1: 찾기 버튼 고정 영역 */
.cta-fixed {
  padding:10px 16px 16px;
  border-top:1px solid var(--border);
  background:var(--bg);
  flex-shrink:0;
}
.btn-search {
  width:100%; padding:14px; background:var(--accent); border:none;
  border-radius:14px; color:#0a0f0d;
  font-family:'Black Han Sans',sans-serif; font-size:1.05rem;
  letter-spacing:2px; cursor:pointer; transition:all 0.2s;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn-search:hover { background:#6ee79d; }
.btn-search:active { transform:scale(0.98); }
.btn-search:disabled { background:var(--border); color:var(--muted); cursor:not-allowed; transform:none; }

/* ── 입력 섹션 ── */
.section { padding:0 16px; }
.section-label {
  font-size:0.68rem; color:var(--muted); letter-spacing:1.5px;
  text-transform:uppercase; font-weight:500; padding:10px 0 6px;
}

/* 경로 입력 */
.route-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.rdot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.rdot.s { background:var(--accent); }
.rdot.e { background:var(--accent2); }

.btn-swap {
  background:var(--card); border:1px solid var(--border);
  color:var(--muted); width:38px; height:38px; border-radius:10px;
  font-size:1rem; cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s; line-height:1;
}
.btn-swap:hover { border-color:var(--accent); color:var(--accent); }
.btn-swap:active { transform:scale(0.9) rotate(180deg); }

.iw { position:relative; flex:1; }
.fi {
  width:100%; background:var(--card); border:1px solid var(--border);
  border-radius:10px; padding:10px 64px 10px 12px;
  color:var(--text); font-family:'Noto Sans KR',sans-serif;
  font-size:0.88rem; outline:none; transition:border-color 0.2s;
}
.fi:focus { border-color:var(--accent); }
.fi::placeholder { color:var(--muted); }

.fi-btns {
  position:absolute; right:6px; top:50%; transform:translateY(-50%);
  display:flex; align-items:center; gap:2px;
}
.btn-fav-pick {
  background:none; border:none; cursor:pointer;
  font-size:1rem; padding:3px; opacity:0.45; transition:opacity 0.15s; line-height:1;
}
.btn-fav-pick:hover { opacity:1; }

.btn-loc {
  background:var(--card); border:1px solid var(--border);
  color:var(--accent); width:38px; height:38px; border-radius:10px;
  font-size:1rem; cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; transition:all 0.15s;
}
.btn-loc:active { transform:scale(0.95); }
.btn-loc.spinning { animation:spin 0.7s linear infinite; }

/* autocomplete */
.ac-list {
  position:absolute; left:0; right:0; top:calc(100% + 4px);
  background:var(--card); border:1px solid var(--accent3);
  border-radius:10px; overflow:hidden; z-index:999;
  box-shadow:0 8px 24px rgba(0,0,0,0.6); display:none;
}
.ac-item {
  display:flex; align-items:center; justify-content:space-between; gap:4px;
  padding:10px 10px 10px 14px; cursor:pointer;
  border-bottom:1px solid var(--border); transition:background 0.15s;
}
.ac-item:last-child { border-bottom:none; }
.ac-item:hover { background:var(--surface); }
.ac-info { flex:1; min-width:0; }
.ac-name { font-weight:500; font-size:0.85rem; }
.ac-addr { font-size:0.72rem; color:var(--muted); margin-top:2px; }
.ac-save {
  background:none; border:none; cursor:pointer;
  font-size:1rem; padding:4px 6px; opacity:0.35;
  transition:opacity 0.15s; flex-shrink:0; line-height:1;
}
.ac-save:hover { opacity:1; }

/* 내 장소 픽커 */
.fav-picker {
  position:absolute; left:0; right:0; top:calc(100% + 4px);
  background:var(--card); border:1px solid var(--accent);
  border-radius:10px; overflow:hidden; z-index:1000;
  box-shadow:0 8px 24px rgba(0,0,0,0.6); display:none;
  max-height:200px; overflow-y:auto;
}
.fav-picker.show { display:block; }
.fav-picker-empty { padding:14px; text-align:center; color:var(--muted); font-size:0.78rem; line-height:1.7; }
.fav-pick-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 14px; cursor:pointer;
  border-bottom:1px solid var(--border); transition:background 0.15s;
}
.fav-pick-item:last-child { border-bottom:none; }
.fav-pick-item:hover { background:var(--surface); }
.fav-pick-icon { font-size:1.2rem; flex-shrink:0; }
.fav-pick-name { font-size:0.88rem; font-weight:500; }
.fav-pick-addr { font-size:0.7rem; color:var(--muted); margin-top:1px; }

/* ── 카테고리 ── */
.cat-scroll {
  display:flex; gap:7px; overflow-x:auto; padding:4px 0 10px;
  scrollbar-width:none;
}
.cat-scroll::-webkit-scrollbar { display:none; }
.cat-chip {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  background:var(--card); border:1.5px solid var(--border);
  border-radius:12px; padding:8px 10px; cursor:pointer;
  transition:all 0.15s; flex-shrink:0; min-width:56px;
  font-size:0.68rem; color:var(--muted);
}
.cat-chip .icon { font-size:1.3rem; }
.cat-chip.on {
  border-color:var(--accent); color:var(--accent);
  background:rgba(74,222,128,0.08);
}

/* ── 우회 슬라이더 ── */
.slider-row { padding:4px 0 12px; }
.slider-label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:8px; }
.slider-label span { color:var(--muted); }
.slider-label strong { color:var(--accent); font-family:'Black Han Sans',sans-serif; }
input[type=range] {
  -webkit-appearance:none; width:100%; height:3px; border-radius:3px;
  background:var(--border); outline:none; cursor:pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:20px; height:20px;
  border-radius:50%; background:var(--accent);
  box-shadow:0 0 0 4px rgba(74,222,128,0.2);
}

/* ── 결과 시트 ── */
.sheet {
  position:absolute; bottom:0; left:0; right:0;
  background:var(--bg); border-top:1px solid var(--border);
  border-radius:20px 20px 0 0; max-height:75vh; overflow-y:auto;
  transform:translateY(100%);
  transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);
  z-index:30; padding-bottom:20px;
}
.sheet.open { transform:translateY(0); }
.sheet-head {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px 10px; position:sticky; top:0;
  background:var(--bg); border-bottom:1px solid var(--border); z-index:1;
}
.sheet-title { font-family:'Black Han Sans',sans-serif; font-size:1rem; color:var(--accent); letter-spacing:1px; }
.sheet-count { font-size:0.75rem; color:var(--muted); margin-left:6px; }
.btn-close {
  background:var(--card); border:none; color:var(--muted);
  width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:0.85rem;
}

/* 결과 카드 */
.result-list { padding:10px 16px 0; }
.result-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; padding:14px; margin-bottom:10px;
  transition:all 0.2s; position:relative; overflow:hidden;
  animation:fadeUp 0.3s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.result-card:nth-child(2){animation-delay:0.05s}
.result-card:nth-child(3){animation-delay:0.1s}
.result-card:nth-child(4){animation-delay:0.15s}
.result-card:nth-child(5){animation-delay:0.2s}
.result-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0;
  width:3px; background:var(--accent); border-radius:2px 0 0 2px;
  opacity:0; transition:opacity 0.2s;
}
.result-card:hover { border-color:var(--accent); }
.result-card:hover::before { opacity:1; }

.rc-top { display:flex; align-items:flex-start; gap:12px; margin-bottom:8px; }
.rc-icon {
  width:42px; height:42px; background:var(--surface);
  border-radius:12px; display:flex; align-items:center; justify-content:center;
  font-size:1.2rem; flex-shrink:0;
}
.rc-info { flex:1; }
.rc-name { font-size:0.9rem; font-weight:700; margin-bottom:2px; }
.rc-cat { font-size:0.7rem; color:var(--muted); }

.rc-badges { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.badge { font-size:0.68rem; padding:3px 8px; border-radius:6px; font-weight:500; }
.badge-detour { background:rgba(56,189,248,0.12); color:var(--accent3); border:1px solid rgba(56,189,248,0.2); }

.rc-addr { font-size:0.72rem; color:var(--muted); margin-bottom:4px; }
.rc-phone { font-size:0.72rem; color:var(--muted); }

/* v2.1: 버튼 2개 */
.rc-actions { display:flex; gap:6px; margin-top:10px; }
.btn-rc {
  flex:1; padding:9px 6px; border-radius:8px; font-size:0.75rem;
  font-family:'Noto Sans KR',sans-serif; cursor:pointer; transition:all 0.15s;
  display:flex; align-items:center; justify-content:center; gap:4px;
}
.btn-navi { background:#3A1D94; border:none; color:#fff; font-weight:500; }
.btn-navi:hover { background:#4c28c4; }
.btn-kakaomap { background:var(--surface); border:1px solid var(--border); color:var(--muted); font-weight:500; }
.btn-kakaomap:hover { border-color:#FFCD00; color:#FFCD00; }

.empty-result {
  text-align:center; padding:40px 20px; color:var(--muted); font-size:0.82rem; line-height:2;
}
.empty-icon { font-size:2.5rem; margin-bottom:10px; opacity:0.4; }

/* ── 로딩 ── */
.loading {
  position:absolute; inset:0; background:rgba(10,15,13,0.88);
  display:none; flex-direction:column; align-items:center; justify-content:center; z-index:40; gap:12px;
}
.loading.show { display:flex; }
.spinner {
  width:36px; height:36px; border:3px solid var(--border);
  border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }
.loading-text { color:var(--muted); font-size:0.82rem; }

/* v2.1: 토스트 메시지 */
.toast {
  position:fixed; bottom:160px; left:50%; transform:translateX(-50%) translateY(20px);
  background:rgba(26,36,28,0.97); border:1px solid var(--border);
  border-radius:10px; padding:10px 18px; font-size:0.82rem;
  color:var(--text); z-index:500; opacity:0;
  transition:all 0.25s ease; pointer-events:none; white-space:nowrap;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* 스크롤바 */
.bottom::-webkit-scrollbar { width:3px; }
.bottom::-webkit-scrollbar-track { background:transparent; }
.bottom::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
.sheet::-webkit-scrollbar { width:3px; }
.sheet::-webkit-scrollbar-track { background:transparent; }
.sheet::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

/* ── 내 장소 모달 ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.7);
  z-index:200; display:none; align-items:flex-end; justify-content:center;
}
.modal-overlay.show { display:flex; }
.modal {
  background:var(--bg); border-radius:20px 20px 0 0;
  width:100%; max-width:480px; max-height:85vh;
  display:flex; flex-direction:column; border-top:1px solid var(--border);
  animation:slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-head {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px 10px; border-bottom:1px solid var(--border); flex-shrink:0;
}
.modal-title { font-family:'Black Han Sans',sans-serif; font-size:1.05rem; color:var(--accent); letter-spacing:1px; }
.modal-body { flex:1; overflow-y:auto; padding:0 16px 24px; }

.tabs { display:flex; gap:6px; margin:14px 0; }
.tab {
  flex:1; padding:8px; border:1px solid var(--border); background:var(--card);
  color:var(--muted); border-radius:10px; font-family:'Noto Sans KR',sans-serif;
  font-size:0.8rem; cursor:pointer; text-align:center; transition:all 0.15s;
}
.tab.on { border-color:var(--accent); color:var(--accent); background:rgba(74,222,128,0.08); }

.place-list { display:flex; flex-direction:column; gap:6px; }
.place-item {
  display:flex; align-items:center; gap:10px; background:var(--card);
  border:1px solid var(--border); border-radius:10px; padding:10px 12px; transition:all 0.15s;
}
.place-item:hover { border-color:var(--accent3); }
.place-icon { font-size:1.3rem; flex-shrink:0; }
.place-info { flex:1; min-width:0; }
.place-name { font-weight:500; font-size:0.88rem; }
.place-addr { font-size:0.72rem; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.btn-place-del { background:none; border:none; color:var(--muted); cursor:pointer; font-size:0.9rem; padding:4px; transition:color 0.15s; flex-shrink:0; }
.btn-place-del:hover { color:var(--danger); }

.place-empty { text-align:center; padding:32px 16px; color:var(--muted); font-size:0.82rem; line-height:1.9; }
.place-empty-icon { font-size:2rem; margin-bottom:8px; }

.add-place-form { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px; }
.form-label { font-size:0.78rem; color:var(--muted); margin-bottom:8px; display:block; }
.icon-picker { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
.icon-opt {
  width:36px; height:36px; border:1.5px solid var(--border); border-radius:8px;
  background:var(--card); font-size:1.1rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all 0.15s;
}
.icon-opt.on { border-color:var(--accent); background:rgba(74,222,128,0.15); }
.add-place-input {
  width:100%; background:var(--card); border:1px solid var(--border); border-radius:8px;
  padding:9px 12px; color:var(--text); font-family:'Noto Sans KR',sans-serif;
  font-size:0.85rem; outline:none; margin-bottom:8px; transition:border-color 0.2s;
}
.add-place-input:focus { border-color:var(--accent); }
.add-place-input::placeholder { color:var(--muted); }
.btn-add-place {
  width:100%; padding:10px; background:var(--accent); border:none;
  border-radius:8px; color:#0a0f0d; font-family:'Black Han Sans',sans-serif;
  font-size:0.9rem; letter-spacing:1px; cursor:pointer; margin-top:4px;
}

/* v2.3: 장소 편집 */
.btn-place-edit { background:none; border:none; color:var(--muted); cursor:pointer; font-size:0.9rem; padding:4px; transition:color 0.15s; flex-shrink:0; }
.btn-place-edit:hover { color:var(--accent3); }
.edit-place-form {
  background:var(--surface); border:1px solid var(--accent3);
  border-radius:12px; padding:14px; margin-top:6px;
  animation:fadeUp 0.2s ease both;
}
.edit-btns { display:flex; gap:8px; margin-top:8px; }
.btn-edit-save {
  flex:1; padding:9px; background:var(--accent3); border:none;
  border-radius:8px; color:#000; font-family:'Black Han Sans',sans-serif; font-size:0.82rem; cursor:pointer;
}
.btn-edit-cancel {
  padding:9px 14px; background:var(--card); border:1px solid var(--border);
  border-radius:8px; color:var(--muted); font-family:'Noto Sans KR',sans-serif; font-size:0.82rem; cursor:pointer;
}

/* v2.4: PWA 설치 모달 */
.pwa-modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.75);
  z-index:400; display:none; align-items:center; justify-content:center;
  padding:24px;
}
.pwa-modal-overlay.show { display:flex; }
.pwa-modal {
  background:var(--card); border:1px solid var(--accent);
  border-radius:20px; padding:28px 24px; width:100%; max-width:320px;
  text-align:center; animation:fadeUp 0.25s ease both;
}
.pwa-modal-icon { font-size:3rem; margin-bottom:10px; }
.pwa-modal-title { font-family:'Black Han Sans',sans-serif; font-size:1.2rem; color:var(--accent); letter-spacing:1px; margin-bottom:20px; }
.btn-pwa-install {
  width:100%; padding:14px; background:var(--accent); border:none;
  border-radius:12px; color:#0a0f0d; font-family:'Black Han Sans',sans-serif;
  font-size:0.92rem; letter-spacing:1px; cursor:pointer; transition:all 0.2s;
}
.btn-pwa-install:hover { background:#6ee79d; }
.btn-pwa-install:active { transform:scale(0.98); }
</style>
</head>
<body>
<div class="app">

  <!-- ── HEADER ── -->
  <div class="header">
    <div class="logo">
      <span class="logo-main">가는 길에</span>
      <span class="logo-sub">DROPBY <span style="font-size:0.65rem;opacity:0.6;letter-spacing:0">v4.0.2</span></span>
    </div>
    <button class="btn-header" onclick="openPlacesModal()">📌 내 장소</button>
  </div>

  <!-- ── MAP ── -->
  <div id="map">
    <div class="map-empty" id="mapEmpty">
      <div class="map-empty-icon">🗺️</div>
      <div class="map-empty-text">출발지와 목적지를 입력하고<br>가는 길에 들를 곳을 찾아보세요</div>
    </div>
    <button class="btn-map-close" onclick="closeMapFullscreen()">✕</button>
    <div class="map-stats" id="mapStats">
      <div class="mstat"><div class="mstat-val" id="sDist">-</div><div class="mstat-label">경로 거리</div></div>
      <div class="mstat"><div class="mstat-val" id="sTime">-</div><div class="mstat-label">소요시간</div></div>
      <div class="mstat"><div class="mstat-val" id="sFound">-</div><div class="mstat-label">발견 장소</div></div>
    </div>
  </div>

  <!-- ── BOTTOM WRAP (스크롤 영역 + 고정 버튼) ── -->
  <div class="bottom-wrap" id="bottomWrap">

    <!-- 스크롤 영역 -->
    <div class="bottom" id="bottom">
      <div class="handle"><div class="handle-bar"></div></div>

      <!-- 경로 입력 -->
      <div class="section">
        <div class="section-label">📍 경로</div>
        <div class="route-row">
          <div class="rdot s"></div>
          <div class="iw">
            <input class="fi" id="fi-start" placeholder="출발지" autocomplete="off">
            <div class="fi-btns">
              <button class="btn-fav-pick" onclick="toggleFavPicker('start')" title="내 장소에서 선택">⭐</button>
            </div>
            <div class="ac-list" id="ac-start"></div>
            <div class="fav-picker" id="fav-start"></div>
          </div>
          <button class="btn-loc" id="btnLoc" onclick="useCurrentLocation()" title="현재 위치">📍</button>
        </div>
        <div class="route-row" style="margin-top:8px;">
          <div class="rdot e"></div>
          <div class="iw">
            <input class="fi" id="fi-end" placeholder="목적지" autocomplete="off">
            <div class="fi-btns">
              <button class="btn-fav-pick" onclick="toggleFavPicker('end')" title="내 장소에서 선택">⭐</button>
            </div>
            <div class="ac-list" id="ac-end"></div>
            <div class="fav-picker" id="fav-end"></div>
          </div>
          <button class="btn-swap" onclick="swapRoute()" title="출발/도착 바꾸기">⇅</button>
        </div>
      </div>

      <!-- 카테고리 -->
      <div class="section">
        <div class="section-label">🎯 무엇을 찾을까?</div>
        <div class="cat-scroll">
          <div class="cat-chip on" data-cat="FD6" onclick="toggleCat(this)"><span class="icon">🍜</span>맛집</div>
          <div class="cat-chip" data-cat="CE7" onclick="toggleCat(this)"><span class="icon">☕</span>카페</div>
          <div class="cat-chip" data-cat="CS2" onclick="toggleCat(this)"><span class="icon">🏪</span>편의점</div>
          <div class="cat-chip" data-cat="OL7" onclick="toggleCat(this)"><span class="icon">⛽</span>주유소</div>
          <div class="cat-chip" data-cat="HP8" onclick="toggleCat(this)"><span class="icon">🅿️</span>휴게소</div>
          <div class="cat-chip" data-cat="MT1" onclick="toggleCat(this)"><span class="icon">🛒</span>마트</div>
          <div class="cat-chip" data-cat="AT4" onclick="toggleCat(this)"><span class="icon">🏛️</span>명소</div>
          <div class="cat-chip" data-cat="AD5" onclick="toggleCat(this)"><span class="icon">🏨</span>숙박</div>
          <div class="cat-chip" data-cat="PM9" onclick="toggleCat(this)"><span class="icon">💊</span>약국</div>
          <div class="cat-chip" data-cat="BK9" onclick="toggleCat(this)"><span class="icon">🏦</span>은행·ATM</div>
          <div class="cat-chip" data-cat="SW8" onclick="toggleCat(this)"><span class="icon">🚉</span>역·터미널</div>
        </div>
      </div>

      <!-- 우회 시간 -->
      <div class="section" style="padding-bottom:4px;">
        <div class="section-label">🔀 최대 우회 시간 &nbsp;<strong id="detourVal" style="color:var(--accent);font-family:'Black Han Sans',sans-serif;">10분</strong></div>
        <div class="slider-row" style="padding:2px 0 8px;">
          <input type="range" id="detourSlider" min="5" max="60" step="5" value="10"
            oninput="updateDetour(this.value)">
        </div>
      </div>
    </div>

    <!-- v2.1: 고정 찾기 버튼 -->
    <div class="cta-fixed">
      <button class="btn-search" id="btnSearch" onclick="doSearch()">
        <span>🔍</span><span>가는 길에 찾기</span>
      </button>
    </div>
  </div>

  <!-- ── 결과 시트 ── -->
  <div class="sheet" id="sheet">
    <div class="sheet-head">
      <div>
        <span class="sheet-title">발견된 장소</span>
        <span class="sheet-count" id="sheetCount"></span>
      </div>
      <button class="btn-close" onclick="closeSheet()">✕</button>
    </div>
    <!-- v4.0.0: 카테고리 서브탭 (카테고리별 조건부 노출) -->
    <div id="subTabArea" style="display:none; padding:0 14px 0; border-bottom:1px solid var(--border);">
      <div id="subTabRow" class="tabs" style="margin:10px 0 8px; overflow-x:auto; flex-wrap:nowrap; scrollbar-width:none;"></div>
    </div>
    <!-- v4.0.0: 약국 야간 배너 (야간·공휴일 조건부 노출) -->

      <span style="font-size:0.78rem; color:#fb923c;">⚠️ 지금 문 열었는지 꼭 확인하고 가세요 →</span>
      <a href="https://pharm114.or.kr" target="_blank" style="font-size:0.78rem; color:#fb923c; text-decoration:underline; margin-left:4px;">휴일지킴이약국</a>
    </div>
    <div class="result-list" id="resultList"></div>
  </div>

  <!-- 토스트 -->

  <!-- 로딩 -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">경로 계산 중...</div>
  </div>

</div>

<!-- v2.4: PWA 설치 모달 -->
<div class="pwa-modal-overlay" id="pwaBanner" onclick="handlePwaOverlayClick(event)">
  <div class="pwa-modal">
    <div class="pwa-modal-icon">🗺️</div>
    <div class="pwa-modal-title">가는 길에</div>
    <button class="btn-pwa-install" id="btnPwaInstall">설치 (주소창 없이 전체화면)</button>
  </div>

<!-- 내 장소 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">📌 내 장소</div>
      <div style="display:flex;align-items:center;gap:6px;">
        <button class="btn-header" onclick="exportPlaces()" title="내보내기">📤</button>
        <button class="btn-header" onclick="importPlaces()" title="가져오기">📥</button>
        <button class="btn-close" onclick="closePlacesModal()">✕</button>
      </div>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
// 설정
// ─────────────────────────────────────────
const KAKAO_KEY = '4d1307b368487f762cb7e2681ede2435';
const LS_PLACES = 'dropby_places_v1';
const ICONS = ['🏠','🌳','🍜','☕','⛽','🏪','🏥','🏋️','📍','🎯','🏖️','🏔️','🛒','🎠','🏢','🏫','💼','📖'];

let kakaoReady = false;
let myCurrentLat = null;
let myCurrentLng = null;
let kakaoMap = null;
let ps = null;
let geocoder = null;
let markers = [];
let polyline = null;
let coords = {};
let acTimers = {};
let selectedIcon = '📍';
let addPlaceCoords = null;
let addPlaceAcTimer = null;

// ─────────────────────────────────────────
// localStorage
// ─────────────────────────────────────────
function loadPlaces() {
  try {
    const places = JSON.parse(localStorage.getItem(LS_PLACES)) || [];
    return places.sort((a, b) => {
      const aKo = /^[가-힣]/.test(a.name);
      const bKo = /^[가-힣]/.test(b.name);
      if (aKo && !bKo) return -1;
      if (!aKo && bKo) return 1;
      return a.name.localeCompare(b.name, 'ko');
    });
  } catch { return []; }
}
function savePlaces(arr) { localStorage.setItem(LS_PLACES, JSON.stringify(arr)); }

// ─────────────────────────────────────────
// 토스트
// ─────────────────────────────────────────
let toastTimer = null;
function showToast(msg, duration = 3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

// ─────────────────────────────────────────
// 초기화
// ─────────────────────────────────────────
function loadKakaoSDK() {
  return new Promise((resolve, reject) => {
    if (window.kakao && window.kakao.maps) { resolve(); return; }
    const s = document.createElement('script');
    s.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_KEY}&libraries=services&autoload=false`;
    s.onload = () => kakao.maps.load(resolve);
    s.onerror = () => reject(new Error('카카오 SDK 로드 실패'));
    document.head.appendChild(s);
  });
}

async function initApp() {
  showToast('지도 로딩 중...');
  try {
    await loadKakaoSDK();
    kakaoReady = true;
    const container = document.getElementById('map');
    kakaoMap = new kakao.maps.Map(container, { center: new kakao.maps.LatLng(36.5, 127.5), level: 13 });
    ps = new kakao.maps.services.Places();
    geocoder = new kakao.maps.services.Geocoder();
    kakao.maps.event.addListener(kakaoMap, 'click', openMapFullscreen);
    if (window.Kakao && !Kakao.isInitialized()) Kakao.init(KAKAO_KEY);
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(pos => {
        myCurrentLat = pos.coords.latitude;
        myCurrentLng = pos.coords.longitude;
        kakaoMap.setCenter(new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude));
        kakaoMap.setLevel(8);
        reverseGeocode(pos.coords.latitude, pos.coords.longitude, addr => {
          document.getElementById('fi-start').value = addr;
          coords[addr] = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        });
      });
    }
    setupInputs();
    setupBackGuard();
  } catch(e) {
    showToast('⚠️ 지도 로드 실패');
  }
}

// ─────────────────────────────────────────
// 현재 위치
// ─────────────────────────────────────────
function useCurrentLocation() {
  if (!navigator.geolocation) { alert('위치 서비스를 사용할 수 없습니다.'); return; }
  const btn = document.getElementById('btnLoc');
  btn.classList.add('spinning'); btn.disabled = true;
  navigator.geolocation.getCurrentPosition(
    pos => {
      myCurrentLat = pos.coords.latitude;
      myCurrentLng = pos.coords.longitude;
      btn.classList.remove('spinning'); btn.disabled = false;
      reverseGeocode(pos.coords.latitude, pos.coords.longitude, addr => {
        document.getElementById('fi-start').value = addr;
        coords[addr] = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      });
    },
    err => { btn.classList.remove('spinning'); btn.disabled = false; alert('위치 오류: ' + err.message); },
    { enableHighAccuracy: true, timeout: 15000 }
  );
}

function reverseGeocode(lat, lng, cb) {
  if (!geocoder) { cb('현재 위치'); return; }
  geocoder.coord2Address(lng, lat, (result, status) => {
    if (status === kakao.maps.services.Status.OK && result.length) {
      const addr = result[0].road_address
        ? result[0].road_address.address_name
        : result[0].address.address_name;
      cb(addr);
    } else cb('현재 위치');
  });
}

// ─────────────────────────────────────────
// 출발 / 도착 역전
// ─────────────────────────────────────────
function swapRoute() {
  const sEl = document.getElementById('fi-start');
  const eEl = document.getElementById('fi-end');
  const tmp = sEl.value; sEl.value = eEl.value; eEl.value = tmp;
  const sc = coords[sEl.value], ec = coords[eEl.value];
  if (sc) coords[sEl.value] = sc;
  if (ec) coords[eEl.value] = ec;
}

// ─────────────────────────────────────────
// 자동완성
// ─────────────────────────────────────────
function setupInputs() {
  setupAC('fi-start', 'ac-start');
  setupAC('fi-end', 'ac-end');
}

function setupAC(inputId, acId) {
  const input = document.getElementById(inputId);
  const acEl = document.getElementById(acId);
  let isComposing = false;
  input.addEventListener('compositionstart', () => isComposing = true);
  input.addEventListener('compositionend', () => { isComposing = false; triggerAC(input, acEl, inputId); });
  input.addEventListener('input', () => { if (isComposing) return; triggerAC(input, acEl, inputId); });
  input.addEventListener('blur', () => setTimeout(() => acEl.style.display = 'none', 200));
}

function triggerAC(input, acEl, key) {
  clearTimeout(acTimers[key]);
  const val = input.value.trim();
  if (val.length < 2) { acEl.style.display = 'none'; return; }
  acTimers[key] = setTimeout(() => searchAC(val, acEl, input), 280);
}

function searchAC(query, acEl, input) {
  if (!ps) return;
  ps.keywordSearch(query, (data, status) => {
    if (status !== kakao.maps.services.Status.OK || !data.length) { acEl.style.display = 'none'; return; }
    acEl.innerHTML = '';
    data.slice(0, 5).forEach(p => {
      const item = document.createElement('div');
      item.className = 'ac-item';
      const info = document.createElement('div');
      info.className = 'ac-info';
      info.innerHTML = `<div class="ac-name">${p.place_name}</div><div class="ac-addr">${p.road_address_name || p.address_name}</div>`;
      const pin = document.createElement('button');
      pin.className = 'ac-save'; pin.textContent = '📌'; pin.title = '내 장소로 저장';
      pin.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); saveToMyPlace(p); });
      item.appendChild(info); item.appendChild(pin);
      item.addEventListener('mousedown', e => {
        if (e.target === pin) return;
        e.preventDefault();
        input.value = p.place_name;
        coords[p.place_name] = { lat: parseFloat(p.y), lng: parseFloat(p.x) };
        acEl.style.display = 'none';
      });
      acEl.appendChild(item);
    });
    acEl.style.display = 'block';
  });
}

// ─────────────────────────────────────────
// 내 장소 픽커
// ─────────────────────────────────────────
function toggleFavPicker(type) {
  const picker = document.getElementById('fav-' + type);
  const isOpen = picker.classList.contains('show');
  closeAllPickers();
  if (!isOpen) { renderFavPicker(picker, type); picker.classList.add('show'); }
}

function closeAllPickers() {
  document.querySelectorAll('.fav-picker').forEach(p => p.classList.remove('show'));
}

function renderFavPicker(picker, type) {
  const places = loadPlaces();
  if (!places.length) {
    picker.innerHTML = `<div class="fav-picker-empty">저장된 장소가 없어요<br><small>📌 내 장소에서 추가하세요</small></div>`;
    return;
  }
  picker.innerHTML = places.map((p, i) => `
    <div class="fav-pick-item" onclick="selectFavPlace('${type}',${i})">
      <div class="fav-pick-icon">${p.icon}</div>
      <div><div class="fav-pick-name">${p.name}</div><div class="fav-pick-addr">${p.addr}</div></div>
    </div>`).join('');
}

function selectFavPlace(type, idx) {
  const p = loadPlaces()[idx]; if (!p) return;
  const inputId = type === 'start' ? 'fi-start' : 'fi-end';
  document.getElementById(inputId).value = p.name;

// ─────────────────────────────────────────
// v3.0: 카카오모빌리티 실제 도로 경로 취득
// ─────────────────────────────────────────
const KAKAO_REST_KEY = 'b3d949996b321a676a0480e24b264a52';

async function getRoadRoute(startC, endC) {
  const url = `https://apis-navi.kakaomobility.com/v1/directions?origin=${startC.lng},${startC.lat}&destination=${endC.lng},${endC.lat}&priority=RECOMMEND`;
  let res;
  try {
    res = await fetch(url, {
      headers: { Authorization: `KakaoAK ${KAKAO_REST_KEY}` }
    });
  } catch(e) {
    throw new Error('경로 API 연결 실패 (CORS 또는 네트워크): ' + e.message);
  }
  if (!res.ok) throw new Error('경로 API 오류: ' + res.status);
  const data = await res.json();
  console.log('카카오모빌리티 응답:', data);
  if (!data.routes || !data.routes[0] || data.routes[0].result_code !== 0) {
    throw new Error('경로를 찾을 수 없습니다: ' + (data.routes?.[0]?.result_msg || ''));
  }
  const route = data.routes[0];
  // 전체 경로 좌표 배열 추출
  const coords = [];
  for (const section of route.sections) {
    for (const road of section.roads) {
      const verts = road.vertexes;
      for (let i = 0; i < verts.length; i += 2) {
        coords.push({ lng: verts[i], lat: verts[i+1] });
      }
    }
  }
  // 총 소요 시간(초) 및 거리(m)
  const totalSec = route.summary.duration;
  const totalDist = route.summary.distance;
  return { coords, totalSec, totalDist };
}

// v3.1: 경로 좌표를 실제 거리 기준으로 균등하게 샘플링
function sampleRoutePoints(coords, totalDist, maxPoints = 10) {
  if (coords.length <= maxPoints) return coords;
  // 총 거리를 maxPoints 구간으로 나눠서 균등 간격 포인트 추출
  const interval = totalDist / maxPoints; // 미터 단위
  const pts = [coords[0]];
  let accumulated = 0;
  let nextTarget = interval;
  for (let i = 1; i < coords.length; i++) {
    const d = distKm(coords[i-1], coords[i]) * 1000;
    accumulated += d;
    if (accumulated >= nextTarget) {
      pts.push(coords[i]);
      nextTarget += interval;
    }
  }
  // 마지막 포인트 항상 포함
  const last = coords[coords.length-1];
  if (pts[pts.length-1] !== last) pts.push(last);
  return pts;
}

// 점과 경로(선분 배열) 사이의 최소 거리(km)
function distToRoute(point, routeCoords) {
  let minDist = Infinity;
  for (const c of routeCoords) {
    const d = distKm(point, c);
    if (d < minDist) minDist = d;
  }
  return minDist;
}

function distKm(a, b) {
  const R = 6371, dLat = (b.lat-a.lat)*Math.PI/180, dLng = (b.lng-a.lng)*Math.PI/180;
  const h = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.asin(Math.sqrt(h));
}

// v4.0.1: 경로 좌표 기반 이탈 시간 계산 (직선 추정 → 실도로 시간 비율 분할)
// 경로상 가장 가까운 포인트까지의 누적 거리 비율로 앞/뒤 구간 시간 분할,
// 장소까지 실제 이탈 거리(왕복)를 경로 평균속도로 환산하여 합산
function calcDetourMin(startC, endC, placeC, totalSec, routeCoords, totalDist) {
  if (!routeCoords || routeCoords.length < 2 || totalDist === 0) {
    // 폴백: 직선 비율 추정
    const totalMin = totalSec / 60;
    const directKm = distKm(startC, endC);
    const viaKm = distKm(startC, placeC) + distKm(placeC, endC);
    if (directKm === 0) return 0;
    return Math.round(Math.max(0, totalMin * (viaKm - directKm) / directKm));
  }

  // 경로상 장소와 가장 가까운 포인트 인덱스 및 이탈 거리 탐색
  let minDist = Infinity;
  let nearestIdx = 0;
  for (let i = 0; i < routeCoords.length; i++) {
    const d = distKm(placeC, routeCoords[i]);
    if (d < minDist) { minDist = d; nearestIdx = i; }
  }

  // 시작~nearest 누적 거리 계산
  let accumulated = 0;
  for (let i = 1; i <= nearestIdx; i++) {
    accumulated += distKm(routeCoords[i-1], routeCoords[i]) * 1000; // 미터
  }

  // 경로 평균 속도 (m/s)
  const avgSpeedMs = totalDist / totalSec;

  // 이탈 왕복 시간 (장소까지 직선 거리 왕복, 평균속도 기준)
  const detourDistM = minDist * 1000 * 2; // 왕복
  const detourSec = detourDistM / avgSpeedMs;

  return Math.round(Math.max(0, detourSec / 60));
}

// v4.0.1: 카카오모빌리티 API로 실제 이탈시간 계산 (출발→장소 + 장소→목적지 - 직행)
async function calcDetourMinReal(startC, endC, placeC, totalSec) {
  try {
    const [r1, r2] = await Promise.all([
      fetch(`https://apis-navi.kakaomobility.com/v1/directions?origin=${startC.lng},${startC.lat}&destination=${placeC.lng},${placeC.lat}&priority=RECOMMEND`,
        { headers: { Authorization: `KakaoAK ${KAKAO_REST_KEY}` } }),
      fetch(`https://apis-navi.kakaomobility.com/v1/directions?origin=${placeC.lng},${placeC.lat}&destination=${endC.lng},${endC.lat}&priority=RECOMMEND`,
        { headers: { Authorization: `KakaoAK ${KAKAO_REST_KEY}` } })
    ]);
    const [d1, d2] = await Promise.all([r1.json(), r2.json()]);
    const sec1 = d1.routes?.[0]?.summary?.duration;
    const sec2 = d2.routes?.[0]?.summary?.duration;
    if (!sec1 || !sec2) return null;
    const detourSec = (sec1 + sec2) - totalSec;
    return Math.round(Math.max(0, detourSec / 60));
  } catch(e) {
    return null; // 실패 시 추정값 사용
  }
}

// ─────────────────────────────────────────
// v3.1: 실제 도로 경로 기반 장소 검색 (구간별 균등 분포)
// ─────────────────────────────────────────
async function searchPlacesAlongRoute(startC, endC, cats, maxDetourMin, routeData) {
  const { coords, totalSec, totalDist } = routeData;
  // 포인트 수: 10km당 2개, 최소 6개, 최대 16개
  const maxPoints = Math.min(16, Math.max(6, Math.round(totalDist / 1000 / 10 * 2)));
  const samplePoints = sampleRoutePoints(coords, totalDist, maxPoints);
  const intervalM = totalDist / samplePoints.length;
  // v4.0.2: 반경을 우회시간 슬라이더 기준으로 확장 (평균속도 × 슬라이더분 × 0.5)
  const avgSpeedMs = totalDist / totalSec; // m/s
  const sliderRadius = avgSpeedMs * (maxDetourMin * 60) * 0.5; // 왕복 절반
  const radius = Math.min(15000, Math.max(1000, sliderRadius));
  // 구간별 최대 장소 수 (출발지 독식 방지)
  const maxPerPoint = Math.ceil(30 / samplePoints.length);
  const seen = new Set();
  const results = [];

  // v4.0.2: 경로 좌표 누적 시간 배열 (출발지 기준 시간 계산용)
  const cumTimeSec = [0];
  for (let i = 1; i < coords.length; i++) {
    const segDist = distKm(coords[i-1], coords[i]) * 1000;
    cumTimeSec.push(cumTimeSec[i-1] + (segDist / totalDist) * totalSec);
  }

  // 포인트 순서로 먼저 순회 (구간별 균등 커버)
  for (const point of samplePoints) {
    for (const cat of cats) {
      let pointCount = 0;
      await new Promise(resolve => {
        ps.categorySearch(cat.cat, (data, status) => {
          if (status === kakao.maps.services.Status.OK) {
            data.forEach(p => {
              if (pointCount >= maxPerPoint) return;
              if (seen.has(p.id)) return;
              seen.add(p.id);
              // v4.0.0: 카테고리 정합성 필터 (HP8 등 엉뚱한 업종 차단)
              const nameFilter = CAT_NAME_FILTER[cat.cat];
              if (nameFilter && !nameFilter(p)) return;
              const placeC = { lat: parseFloat(p.y), lng: parseFloat(p.x) };
              const distFromRoute = distToRoute(placeC, coords);
              if (distFromRoute > radius / 1000) return;
              const detourMin = calcDetourMin(startC, endC, placeC, totalSec, coords, totalDist);
              if (detourMin <= maxDetourMin) {
                // v4.0.2: 출발지 기준 시간 — 가장 가까운 경로 포인트까지 누적 시간
                let nearIdx = 0, minD = Infinity;
                for (let i = 0; i < coords.length; i++) {
                  const d = distKm(placeC, coords[i]);
                  if (d < minD) { minD = d; nearIdx = i; }
                }
                const fromStartMin = Math.round(cumTimeSec[nearIdx] / 60);
                pointCount++;
                results.push({
                  id: p.id, name: p.place_name,
                  cat: cat.label, icon: cat.icon,
                  catCode: cat.cat,
                  catName: p.category_name || '',
                  addr: p.road_address_name || p.address_name,
                  phone: p.phone || '',
                  url: p.place_url || '',
                  lat: placeC.lat, lng: placeC.lng,
                  detourMin,
                  fromStartMin                              // v4.0.2: 출발지 기준 시간
                });
              }
            });
          }
          resolve();
        }, {
          location: new kakao.maps.LatLng(point.lat, point.lng),
          radius: Math.round(radius),
          sort: kakao.maps.services.SortBy.ACCURACY
        });
      });
    }
  }

  // v4.0.1: 상위 6개만 실API 이탈시간 계산, 나머지는 추정값 유지
  document.getElementById('loadingText').textContent = '이탈 시간 계산 중...';
  // 1차 추정값 기준 정렬
  results.sort((a, b) => a.detourMin - b.detourMin);
  // 상위 6개 실호출 (병렬)
  await Promise.all(results.slice(0, 6).map(async r => {
    const placeC = { lat: r.lat, lng: r.lng };
    const real = await calcDetourMinReal(startC, endC, placeC, totalSec);
    if (real !== null) { r.detourMin = real; r.detourExact = true; }
  }));
  // 나머지는 추정 표시 플래그
  results.slice(6).forEach(r => { r.detourExact = false; });

  // maxDetourMin 재필터 (실API 기준, 추정은 관대하게 통과)
  const filtered = results.filter(r => r.detourExact ? r.detourMin <= maxDetourMin : r.detourMin <= maxDetourMin * 1.5);
  filtered.sort((a, b) => a.detourMin - b.detourMin);
  return filtered;
}

// ─────────────────────────────────────────
// 메인 검색
// ─────────────────────────────────────────
let searchResult = { startC: null, endC: null, places: [] };

async function doSearch() {
  if (!kakaoReady) { alert('지도가 로딩 중입니다.'); return; }
  const startName = document.getElementById('fi-start').value.trim();
  const endName = document.getElementById('fi-end').value.trim();
  if (!startName) { alert('출발지를 입력해주세요'); return; }
  if (!endName) { alert('목적지를 입력해주세요'); return; }
  const cats = getActiveCats();
  const maxDetour = parseInt(document.getElementById('detourSlider').value);

  document.getElementById('btnSearch').disabled = true;
  document.getElementById('loadingText').textContent = '출발지 검색 중...';
  document.getElementById('loading').classList.add('show');

  try {
    const startC = await getCoords(startName);
    if (!startC) { alert(`"${startName}"을 찾을 수 없습니다`); return; }
    document.getElementById('loadingText').textContent = '목적지 검색 중...';
    const endC = await getCoords(endName);
    if (!endC) { alert(`"${endName}"을 찾을 수 없습니다`); return; }
    document.getElementById('loadingText').textContent = '실제 도로 경로 계산 중...';
    let routeData;
    try {
      routeData = await getRoadRoute(startC, endC);
    } catch(routeErr) {
      console.warn('도로 경로 API 실패, 직선 폴백:', routeErr.message);
      showToast('⚠️ 도로 경로 오류, 직선 경로로 대체합니다');
      // 직선 폴백
      const steps = 8;
      const coords = [];
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        coords.push({ lat: startC.lat + (endC.lat - startC.lat) * t, lng: startC.lng + (endC.lng - startC.lng) * t });
      }
      const distM = distKm(startC, endC) * 1000;
      routeData = { coords, totalSec: distM / 40 * 3.6, totalDist: distM };
    }
    document.getElementById('loadingText').textContent = '경로 주변 장소 탐색 중...';
    const places = await searchPlacesAlongRoute(startC, endC, cats, maxDetour, routeData);
    searchResult = { startC, endC, places, startName, endName };
    drawRoute(startC, endC, places, routeData);
    showResults(places);
  } catch(e) {
    alert('오류: ' + e.message);
  } finally {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('btnSearch').disabled = false;
  }
}

// ─────────────────────────────────────────
// 지도
// ─────────────────────────────────────────
function drawRoute(startC, endC, places, routeData) {
  markers.forEach(m => m.setMap(null)); markers = [];
  if (polyline) polyline.setMap(null);

  const sLL = new kakao.maps.LatLng(startC.lat, startC.lng);
  const eLL = new kakao.maps.LatLng(endC.lat, endC.lng);

  // v3.0: 실제 도로 경로선
  const path = routeData?.coords
    ? routeData.coords.map(c => new kakao.maps.LatLng(c.lat, c.lng))
    : [sLL, eLL];

  polyline = new kakao.maps.Polyline({
    map: kakaoMap, path,
    strokeWeight: 5, strokeColor: '#4ade80', strokeOpacity: 0.8, strokeStyle: 'solid'
  });

  const mkLabel = (ll, html) => {
    markers.push(new kakao.maps.CustomOverlay({ map: kakaoMap, position: ll, content: html, yAnchor: 1.5 }));
  };
  mkLabel(sLL, `<div style="background:#4ade80;color:#0a0f0d;padding:4px 9px;border-radius:10px;font-size:11px;font-weight:700;font-family:sans-serif;box-shadow:0 2px 8px rgba(0,0,0,0.4)">출발</div>`);
  mkLabel(eLL, `<div style="background:#fb923c;color:#fff;padding:4px 9px;border-radius:10px;font-size:11px;font-weight:700;font-family:sans-serif;box-shadow:0 2px 8px rgba(0,0,0,0.4)">도착</div>`);

  places.slice(0, 10).forEach(p => {
    markers.push(new kakao.maps.CustomOverlay({
      map: kakaoMap,
      position: new kakao.maps.LatLng(p.lat, p.lng),
      content: `<div style="background:#1a241c;border:1.5px solid #4ade80;color:#4ade80;padding:3px 7px;border-radius:8px;font-size:10px;font-family:sans-serif;box-shadow:0 2px 6px rgba(0,0,0,0.5);white-space:nowrap">${p.icon} ${p.name}</div>`,
      yAnchor: 1.4
    }));
  });

  const bounds = new kakao.maps.LatLngBounds();
  bounds.extend(sLL); bounds.extend(eLL);
  places.slice(0, 10).forEach(p => bounds.extend(new kakao.maps.LatLng(p.lat, p.lng)));
  kakaoMap.setBounds(bounds);

  const totalKm = (routeData.totalDist / 1000).toFixed(1);
  const totalMin = Math.round(routeData.totalSec / 60);
  document.getElementById('sDist').textContent = totalKm + 'km';
  document.getElementById('sTime').textContent = Math.floor(totalMin/60) + 'h' + (totalMin%60) + 'm';
  document.getElementById('sFound').textContent = places.length + '곳';
  document.getElementById('mapStats').classList.add('show');
  document.getElementById('mapEmpty').classList.add('hide');
}

// ─────────────────────────────────────────
// 결과 카드 (v2.1: 실제 데이터만, 버튼 2개)
// ─────────────────────────────────────────
// v4.0.0: 카드 렌더링 (서브탭 필터 후 호출)
function renderCards(places) {
  const list = document.getElementById('resultList');
  list.innerHTML = '';

  if (!places.length) {
    list.innerHTML = `<div class="empty-result"><div class="empty-icon">🔍</div><div>가는 길에 들를 곳을 찾지 못했어요<br>우회 시간을 늘려보거나<br>다른 카테고리를 선택해보세요</div></div>`;
    return;
  }

  places.forEach((p, i) => {
    // naviToPlace/openKakaoMap/openNaver 는 searchResult.places 인덱스 필요 → 원본 인덱스 유지
    const origIdx = searchResult.places.indexOf(p);
    const card = document.createElement('div');
    card.className = 'result-card';
    card.style.animationDelay = (i * 0.05) + 's';
    card.style.cursor = 'pointer';
    card.innerHTML = `
      <div class="rc-top">
        <div class="rc-icon">${p.icon}</div>
        <div class="rc-info">
          <div class="rc-name">${p.name}</div>
          <div class="rc-cat">${p.cat}</div>
        </div>
      </div>
      <div class="rc-badges">
        <span class="badge badge-detour">🔀 들르면 +${p.detourMin}분</span>
        <span class="badge badge-detour" style="margin-left:6px;">🕐 출발지에서 ${p.fromStartMin}분</span>
      </div>
      <div class="rc-addr">📌 ${p.addr}</div>
      ${p.phone ? `<div class="rc-phone">📞 ${p.phone}</div>` : ''}
      <div class="rc-actions">
        <button class="btn-rc btn-navi" onclick="event.stopPropagation();naviToPlace(${origIdx})">🧭 여기 들르기 (내비 연결)</button>
        <button class="btn-rc btn-kakaomap" onclick="event.stopPropagation();openKakaoMap(${origIdx})">🗺️ 카카오맵 연결</button>
      </div>`;
    card.addEventListener('click', e => { if (!e.target.closest('.rc-actions')) openNaver(origIdx); });
    list.appendChild(card);
  });
}

// v4.0.0: showResults — 서브탭·배너·명소 필터 처리 후 renderCards 호출
function showResults(places) {
  // 명소(AT4): 테마파크·동물원·경기장 제외
  const AT4_EXCLUDE = /테마파크|놀이공원|동물원|수족관|경기장|스타디움/;
  places = places.map(p => {
    if (p.catCode === 'AT4') p._excluded = AT4_EXCLUDE.test(p.catName || '');
    return p;
  }).filter(p => !p._excluded);

  currentPlaces = places;
  document.getElementById('sheetCount').textContent = `${places.length}곳 발견`;

  if (!places.length) {
    document.getElementById('subTabArea').style.display = 'none';
    document.getElementById('pharmacyBanner').style.display = 'none';
    renderCards([]);
    document.getElementById('sheet').classList.add('open');
    document.getElementById('bottomWrap').style.display = 'none';
    return;
  }

  // 단일 카테고리일 때만 서브탭 노출
  const cats = getActiveCats();
  currentSingleCat = cats.length === 1 ? cats[0].cat : null;

  // 약국 배너
  const hasPM9 = cats.some(c => c.cat === 'PM9');
  document.getElementById('pharmacyBanner').style.display =
    (hasPM9 && shouldShowPharmacyBanner()) ? '' : 'none';

  // 서브탭 렌더 및 초기 필터
  if (currentSingleCat && CAT_SUBTABS[currentSingleCat]) {
    renderSubTabs(currentSingleCat, places);
    applySubTabFilter(currentSingleCat, places);
  } else {
    document.getElementById('subTabArea').style.display = 'none';
    renderCards(places);
  }

  document.getElementById('sheet').classList.add('open');
  document.getElementById('bottomWrap').style.display = 'none';
}

// ─────────────────────────────────────────
// v2.1: 카카오내비 (없으면 토스트 안내)
// ─────────────────────────────────────────
function naviToPlace(idx) {
  const place = searchResult.places[idx];
  const { endC, endName } = searchResult;
  if (!place) return;

  if (!window.Kakao || !Kakao.isInitialized()) Kakao.init(KAKAO_KEY);

  try {
    Kakao.Navi.start({
      name: endName || '목적지',
      x: endC.lng, y: endC.lat,
      coordType: 'wgs84',
      viaPoints: [{ name: place.name, x: place.lng, y: place.lat }]
    });
  } catch(e) {
    showToast('카카오내비 앱이 필요합니다 🧭');
  }
}

// ─────────────────────────────────────────
// v2.1: 네이버 플레이스 연결 (카드 본문 터치)
// ─────────────────────────────────────────
function openNaver(idx) {
  const place = searchResult.places[idx];
  if (!place) return;
  const url = `https://m.search.naver.com/search.naver?query=${encodeURIComponent(place.name + ' ' + place.addr)}`;
  window.open(url, '_blank');
}

// ─────────────────────────────────────────
// v2.4: 카카오맵 연결 (대중교통, 출발=현위치, 목적지=가게)
// ─────────────────────────────────────────
function openKakaoMap(idx) {
  const place = searchResult.places[idx];
  if (!place) return;

  const launch = (sLat, sLng) => {
    const appUrl = `kakaomap://route?sp=${sLat},${sLng}&ep=${place.lat},${place.lng}&by=PUBLICTRANSIT`;
    const webUrl = `https://map.kakao.com/link/from/현재위치,${sLat},${sLng}/to/${encodeURIComponent(place.name)},${place.lat},${place.lng}`;
    const appLink = document.createElement('a');
    appLink.href = appUrl;
    appLink.click();
    setTimeout(() => window.open(webUrl, '_blank'), 1500);
  };

  if (myCurrentLat && myCurrentLng) {
    launch(myCurrentLat, myCurrentLng);
  } else {
    if (!navigator.geolocation) {
      window.open(`https://map.kakao.com/link/to/${encodeURIComponent(place.name)},${place.lat},${place.lng}`, '_blank');
      return;
    }
    showToast('현재 위치 확인 중...');
    navigator.geolocation.getCurrentPosition(
      pos => {
        myCurrentLat = pos.coords.latitude;
        myCurrentLng = pos.coords.longitude;
        launch(myCurrentLat, myCurrentLng);
      },
      () => {
        window.open(`https://map.kakao.com/link/to/${encodeURIComponent(place.name)},${place.lat},${place.lng}`, '_blank');
      },
      { enableHighAccuracy: true, timeout: 8000 }
    );
  }
}

function renderPlacesModal() {

        : `<div class="place-list">${places.map((p, i) => `

              <button class="btn-place-edit" onclick="openEditPlace(event,${i})">✏️</button>
              <button class="btn-place-del" onclick="deletePlace(event,${i})">🗑️</button>
            </div>`).join('')}</div>`}
    </div>
    <div id="place-add-view" style="display:none">
      <div class="add-place-form">
        <span class="form-label">아이콘 선택</span>

function switchTab(tab) {
  document.getElementById('tab-list').classList.toggle('on', tab === 'list');
  document.getElementById('tab-add').classList.toggle('on', tab === 'add');
  document.getElementById('place-list-view').style.display = tab === 'list' ? '' : 'none';
  document.getElementById('place-add-view').style.display = tab === 'add' ? '' : 'none';
  if (tab === 'add') { addPlaceCoords = null; setupAddPlaceAC(); }
}

function selectIcon(ic) {
  selectedIcon = ic;
  document.querySelectorAll('#iconPicker .icon-opt').forEach(el => el.classList.toggle('on', el.textContent === ic));
}

function setupAddPlaceAC() {
  const input = document.getElementById('addPlaceAddr');
  const acEl = document.getElementById('ac-add-place');
  if (!input) return;
  input.addEventListener('input', () => {
    const val = input.value.trim();
    if (val.length < 2) { acEl.style.display = 'none'; return; }
    clearTimeout(addPlaceAcTimer);
    addPlaceAcTimer = setTimeout(() => {
      if (!ps) return;
      ps.keywordSearch(val, (data, status) => {
        if (status !== kakao.maps.services.Status.OK || !data.length) { acEl.style.display = 'none'; return; }
        acEl.innerHTML = '';
        data.slice(0, 5).forEach(p => {
          const item = document.createElement('div');
          item.className = 'ac-item';
          item.innerHTML = `<div class="ac-info"><div class="ac-name">${p.place_name}</div><div class="ac-addr">${p.road_address_name || p.address_name}</div></div>`;
          item.addEventListener('mousedown', e => {
            e.preventDefault();
            input.value = p.place_name;
            addPlaceCoords = { lat: parseFloat(p.y), lng: parseFloat(p.x) };
            acEl.style.display = 'none';
          });
          acEl.appendChild(item);
        });
        acEl.style.display = 'block';
      });
    }, 250);
  });
  input.addEventListener('blur', () => setTimeout(() => acEl.style.display = 'none', 200));
}

async function saveNewPlace() {
  const name = document.getElementById('addPlaceName').value.trim();
  const addr = document.getElementById('addPlaceAddr').value.trim();
  if (!name) { alert('장소 이름을 입력해주세요'); return; }
  if (!addr) { alert('주소를 검색해주세요'); return; }
  const places = loadPlaces();
  if (places.some(x => x.name === name)) { alert(`"${name}"은 이미 저장되어 있어요`); return; }
  const c = addPlaceCoords || await getCoords(addr);
  places.push({ icon: selectedIcon, name, addr, lat: c?.lat || null, lng: c?.lng || null });
  savePlaces(places);
  if (c) coords[name] = c;
  showToast(`✅ "${name}" 저장 완료!`);
  renderPlacesModal();
}

function deletePlace(e, idx) {
  e.stopPropagation();
  const places = loadPlaces();
  if (!confirm(`"${places[idx].name}"을 삭제할까요?`)) return;
  places.splice(idx, 1); savePlaces(places); renderPlacesModal();
}

function selectEditIcon(ic, idx) {
  editingIcon = ic;
  document.querySelectorAll('#edit-icon-picker-' + idx + ' .icon-opt').forEach(el =>
    el.classList.toggle('on', el.textContent === ic)
  );

function closeEditPlace(idx) {
  const form = document.getElementById('edit-form-' + idx);

}

function saveEditPlace(idx) {
  const name = document.getElementById('edit-name-' + idx).value.trim();
  const addr = document.getElementById('edit-addr-' + idx).value.trim();
  if (!name) { alert('장소 이름을 입력해주세요'); return; }

  savePlaces(places);
  if (places[idx].lat && places[idx].lng) coords[name] = { lat: places[idx].lat, lng: places[idx].lng };
  showToast('✅ "' + name + '" 수정 완료!');
  renderPlacesModal();
}

function dismissPwaBanner() {
  document.getElementById('pwaBanner').classList.remove('show');
  localStorage.setItem('pwa_dismissed', '1');
}

function handlePwaOverlayClick(e) {
  if (e.target === document.getElementById('pwaBanner')) dismissPwaBanner();
}

function exportPlaces() {
  const places = loadPlaces();
  if (!places.length) { showToast('저장된 장소가 없어요'); return; }
  const blob = new Blob([JSON.stringify(places, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `dropby_places_${new Date().toISOString().slice(0,16).replace('T','_').replace(':','')}.json`;
  a.click();
  showToast('✅ 내 장소를 Download 폴더에 저장했어요', 2000);
}

function importPlaces() {
  showToast('📂 Download 폴더에서 파일을 선택하세요', 4000);
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const imported = JSON.parse(ev.target.result);
        const existing = loadPlaces();
        let added = 0, skipped = 0;
        imported.forEach(p => {
          if (existing.some(x => x.addr === p.addr)) { skipped++; return; }
          existing.push(p); added++;
        });
        savePlaces(existing);
        if (added === 0) showToast('이미 저장된 장소예요');
        else if (skipped === 0) showToast(`✅ ${added}개 장소를 가져왔어요`);
        else showToast(`✅ ${added}개 추가, ${skipped}개는 이미 있어요`);
        renderPlacesModal();
      } catch { showToast('⚠️ 파일을 읽을 수 없어요'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// iOS 안내
window.addEventListener('load', () => {
  const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone;
  const dismissed = localStorage.getItem('pwa_dismissed');
  if (isIos && !isStandalone && !dismissed) {
    setTimeout(() => {
      const modal = document.getElementById('pwaBanner');
      modal.querySelector('.btn-pwa-install').textContent = '공유 → 홈 화면에 추가';
      modal.classList.add('show');
    }, 2000);
  }
});

window.onload = initApp;
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
</script>
