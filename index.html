                     필터 섹션 제거 / 내비 버튼 개선 (카카오내비 없을 시 안내)
                     네이버 플레이스 버튼 추가 / 전화번호 실제 표시

                     Pull-to-Refresh 복원 (overflow:hidden 제거)
  v2.3 - 2026.03.08  내 장소 편집 기능 추가 (루트마스터 방식)
                     PWA 설치 지원 (Base64 인라인 아이콘 + manifest + 설치 안내)

                     네이버 버튼 → 카카오맵 연결 (대중교통, 출발=현위치, 목적지=가게)
  v2.5 - 2026.03.08  카카오맵 연결 개선 - GPS 현위치 출발지 포함, 대중교통 길찾기 모드로 바로 진입
  v2.6 - 2026.03.08  동적 manifest 제거 → manifest.json 파일 연결 / 카테고리 강제 선택 제거
  v3.0 - 2026.03.08  직선 경로 → 카카오모빌리티 실제 도로 경로 기반으로 전면 개편
  v3.1 - 2026.03.08  경로 샘플링 거리 기준 균등 분포 / 검색 반경 경로 길이 기반 자동 조정
  v3.2 - 2026.03.08  직접 주소를 타이핑하여 내 장소로 저장할 때 이름을 띄어 쓰기를 하면 발생하는 오류 수정
  v3.3 - 2026.03.09  카테고리 개편: 편의점(CS2) 추가, 은행·ATM(BK9) 추가, 교통→역·터미널 이름 변경 및 순서 조정
  v3.4 - 2026.03.09  탐색 결과 검색을 네이버 지도에서 네이버 플레이스로 변경

                       약국 야간 배너, 명소 category_name 필터링, 주유소 정렬 토글

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="가는 길에">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0f0d">
<title>가는 길에 · DropBy</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --bg: #0a0f0d;
  --surface: #121a14;
  --card: #1a241c;
  --border: #2e3a30;
  --accent: #4ade80;
  --accent2: #fb923c;
  --accent3: #38bdf8;
  --gold: #fbbf24;
  --text: #ffffff;
  --muted: rgba(255,255,255,0.38);
  --danger: #f87171;
  --selected: #fbbf24;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:14px; }

/* v2.1: app을 flex column으로, 찾기 버튼 고정을 위해 구조 변경 */
.app { display:flex; flex-direction:column; height:100vh; max-width:480px; margin:0 auto; position:relative; }

/* ── HEADER ── */
.header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px 12px;
  background:var(--bg); border-bottom:1px solid var(--border);
  position:relative; z-index:10;
}
.logo { display:flex; align-items:baseline; gap:8px; }
.logo-main { font-family:'Black Han Sans',sans-serif; font-size:1.25rem; letter-spacing:1px; color:var(--accent); }
.logo-sub { font-size:0.72rem; color:var(--muted); letter-spacing:2px; font-weight:300; }
.btn-header {
  background:var(--card); border:1px solid var(--accent3);
  color:var(--text); font-size:0.75rem; padding:6px 10px;
  border-radius:8px; font-family:'Noto Sans KR',sans-serif;
  cursor:pointer; transition:all 0.15s;
}
.btn-header:hover { border-color:var(--accent); color:var(--accent); }

/* ── MAP ── */
#map {
  flex:none; height:319px; position:relative;
  background:var(--surface); cursor:pointer;
}
#map.fullscreen { position:fixed; inset:0; z-index:100; max-width:100%; width:100% !important; height:100% !important; cursor:default; }
.btn-map-close {
  position:absolute; top:12px; right:12px; z-index:101;
  background:rgba(10,15,13,0.88); border:1px solid var(--border);
  color:var(--text); width:36px; height:36px; border-radius:50%;
  font-size:0.9rem; cursor:pointer; display:none; align-items:center; justify-content:center;
}
#map.fullscreen .btn-map-close { display:flex; }

.map-empty {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:8px; pointer-events:none; z-index:1;
}
.map-empty.hide { display:none; }
.map-empty-icon { font-size:2.2rem; opacity:0.4; }
.map-empty-text { color:var(--muted); font-size:0.78rem; text-align:center; line-height:1.7; }

.map-stats {
  position:absolute; top:10px; left:10px; right:10px;
  background:rgba(10,15,13,0.92); backdrop-filter:blur(12px);
  border:1px solid var(--border); border-radius:14px;
  padding:10px 14px; z-index:5; display:none;
}
.map-stats.show { display:flex; gap:0; }
.mstat { flex:1; text-align:center; }
.mstat + .mstat { border-left:1px solid var(--border); }
.mstat-val { font-family:'Black Han Sans',sans-serif; font-size:1.1rem; color:var(--accent); }
.mstat-label { font-size:0.62rem; color:var(--muted); margin-top:1px; }

/* ── BOTTOM PANEL ── */
/* v2.1: 찾기 버튼 고정을 위해 bottom + cta-fixed 분리 */
.bottom-wrap {
  flex-shrink:0; display:flex; flex-direction:column;
  background:var(--bg); border-top:1px solid var(--border);
  position:relative; z-index:25;
}
.bottom {
  overflow-y:auto; max-height:48vh;
  -webkit-overflow-scrolling:touch;
}
.handle { display:flex; justify-content:center; padding:8px; }
.handle-bar { width:32px; height:3px; background:var(--border); border-radius:2px; }

/* v2.1: 찾기 버튼 고정 영역 */
.cta-fixed {
  padding:10px 16px 16px;
  border-top:1px solid var(--border);
  background:var(--bg);
  flex-shrink:0;
}
.btn-search {
  width:100%; padding:14px; background:var(--accent); border:none;
  border-radius:14px; color:#0a0f0d;
  font-family:'Black Han Sans',sans-serif; font-size:1.05rem;
  letter-spacing:2px; cursor:pointer; transition:all 0.2s;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn-search:hover { background:#6ee79d; }
.btn-search:active { transform:scale(0.98); }
.btn-search:disabled { background:var(--border); color:var(--muted); cursor:not-allowed; transform:none; }

/* ── 입력 섹션 ── */
.section { padding:0 16px; }
.section-label {
  font-size:0.68rem; color:rgba(255,255,255,0.5); letter-spacing:1.5px;
  text-transform:uppercase; font-weight:500; padding:10px 0 6px;
}

/* 경로 입력 */
.route-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.rdot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.rdot.s { background:var(--accent); }
.rdot.e { background:var(--accent2); }

.btn-swap {
  background:var(--card); border:1px solid var(--border);
  color:var(--muted); width:38px; height:38px; border-radius:10px;
  font-size:1rem; cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s; line-height:1;
}
.btn-swap:hover { border-color:var(--accent); color:var(--accent); }
.btn-swap:active { transform:scale(0.9) rotate(180deg); }

.iw { position:relative; flex:1; }
.fi {
  width:100%; background:var(--card); border:1px solid rgba(255,255,255,0.15);
  border-radius:10px; padding:10px 64px 10px 12px;
  color:var(--text); font-family:'Noto Sans KR',sans-serif;
  font-size:0.88rem; outline:none; transition:border-color 0.2s;
}
.fi:focus { border-color:var(--accent); }
.fi::placeholder { color:rgba(255,255,255,0.3); }

.fi-btns {
  position:absolute; right:6px; top:50%; transform:translateY(-50%);
  display:flex; align-items:center; gap:2px;
}
.btn-fav-pick {
  background:none; border:none; cursor:pointer;
  font-size:1rem; padding:3px; opacity:0.85; transition:opacity 0.15s; line-height:1;
}
.btn-fav-pick:hover { opacity:1; }

.btn-loc {
  background:var(--card); border:1px solid var(--border);
  color:var(--accent); width:38px; height:38px; border-radius:10px;
  font-size:1rem; cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; transition:all 0.15s;
}
.btn-loc:active { transform:scale(0.95); }
.btn-loc.spinning { animation:spin 0.7s linear infinite; }

/* autocomplete */
.ac-list {
  position:absolute; left:-14px; right:-35px; top:calc(100% + 6px);
  background:var(--card); border:1px solid var(--accent3);
  border-radius:12px; overflow:hidden; z-index:999;
  box-shadow:0 12px 32px rgba(0,0,0,0.7); display:none;
}
.ac-item {
  display:flex; align-items:center; justify-content:space-between; gap:4px;
  padding:13px 12px 13px 16px; cursor:pointer;
  border-bottom:1px solid var(--border); transition:background 0.15s;
}
.ac-item:last-child { border-bottom:none; }
.ac-item:active { background:var(--surface); }
.ac-info { flex:1; min-width:0; }
.ac-name { font-weight:500; font-size:0.9rem; }
.ac-addr { font-size:0.75rem; color:var(--muted); margin-top:3px; }
.ac-save {
  background:none; border:none; cursor:pointer;
  font-size:1rem; padding:4px 6px; opacity:0.35;
  transition:opacity 0.15s; flex-shrink:0; line-height:1;
}
.ac-save:hover { opacity:1; }

/* 내 장소 픽커 */
.fav-picker {
  position:absolute; left:-14px; right:-35px; top:calc(100% + 6px);
  background:var(--card); border:1px solid var(--accent);
  border-radius:12px; overflow:hidden; z-index:1000;
  box-shadow:0 12px 32px rgba(0,0,0,0.7); display:none;
  max-height:220px; overflow-y:auto;
}
.fav-picker.show { display:block; }
.fav-picker-empty { padding:14px; text-align:center; color:var(--muted); font-size:0.78rem; line-height:1.7; }
.fav-pick-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 14px; cursor:pointer;
  border-bottom:1px solid var(--border); transition:background 0.15s;
}
.fav-pick-item:last-child { border-bottom:none; }
.fav-pick-item:hover { background:var(--surface); }
.fav-pick-icon { font-size:1.2rem; flex-shrink:0; }
.fav-pick-name { font-size:0.88rem; font-weight:500; }
.fav-pick-addr { font-size:0.7rem; color:var(--muted); margin-top:1px; }

/* ── 카테고리 ── */
.cat-scroll {
  display:flex; gap:7px; overflow-x:auto; padding:4px 0 10px;
  scrollbar-width:none;
}
.cat-scroll::-webkit-scrollbar { display:none; }
.cat-chip {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  background:var(--card); border:1.5px solid rgba(255,255,255,0.15);
  border-radius:12px; padding:8px 10px; cursor:pointer;
  transition:all 0.15s; flex-shrink:0; min-width:56px;
  font-size:0.68rem; color:rgba(255,255,255,0.45);
}
.cat-chip .icon { font-size:1.3rem; }
.cat-chip.on {
  border-color:var(--accent); color:var(--accent);
  background:rgba(74,222,128,0.08);
}

/* ── 우회 슬라이더 ── */
.slider-row { padding:4px 0 12px; }
.slider-label { display:flex; justify-content:space-between; font-size:0.78rem; margin-bottom:8px; }
.slider-label span { color:rgba(255,255,255,0.5); }
.slider-label strong { color:var(--accent); font-family:'Black Han Sans',sans-serif; }
input[type=range] {
  -webkit-appearance:none; width:100%; height:3px; border-radius:3px;
  background:var(--border); outline:none; cursor:pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:10px; height:10px;
  border-radius:50%; background:var(--accent);
  box-shadow:0 0 0 2px rgba(74,222,128,0.2);
}

/* ── 결과 시트 ── */
.sheet {
  position:absolute; bottom:0; left:0; right:0;
  background:var(--bg); border-top:1px solid var(--border);
  border-radius:20px 20px 0 0; max-height:60vh; overflow-y:auto;
  transform:translateY(100%);
  transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);
  z-index:30; padding-bottom:20px;
}
.sheet.open { transform:translateY(0); }
.sheet-head {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px 10px; position:sticky; top:0;
  background:var(--bg); border-bottom:1px solid var(--border); z-index:1;
}
.sheet-title { font-family:'Black Han Sans',sans-serif; font-size:1rem; color:var(--accent); letter-spacing:1px; }
.sheet-count { font-size:0.75rem; color:var(--muted); margin-left:6px; }
.btn-close {
  background:var(--card); border:none; color:var(--muted);
  width:32px; height:32px; border-radius:50%; cursor:pointer; font-size:0.85rem;
}

/* 결과 카드 */
.result-list { padding:10px 16px 0; }
.result-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; padding:14px; margin-bottom:10px;
  transition:all 0.2s; position:relative; overflow:hidden;
  animation:fadeUp 0.3s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.result-card:nth-child(2){animation-delay:0.05s}
.result-card:nth-child(3){animation-delay:0.1s}
.result-card:nth-child(4){animation-delay:0.15s}
.result-card:nth-child(5){animation-delay:0.2s}
.result-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0;
  width:3px; background:var(--accent); border-radius:2px 0 0 2px;
  opacity:0; transition:opacity 0.2s;
}
.result-card:hover { border-color:var(--accent); }
.result-card:hover::before { opacity:1; }
.result-card.highlight { border-color:var(--accent) !important; }
.result-card.highlight::before { opacity:1 !important; }

.rc-top { display:flex; align-items:flex-start; gap:12px; margin-bottom:8px; }
.rc-icon {
  width:42px; height:42px; background:var(--surface);
  border-radius:12px; display:flex; align-items:center; justify-content:center;
  font-size:1.2rem; flex-shrink:0;
}
.rc-info { flex:1; }
.rc-name { font-size:0.9rem; font-weight:700; margin-bottom:2px; }
.rc-cat { font-size:0.7rem; color:var(--muted); }

.rc-badges { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.badge { font-size:0.68rem; padding:3px 8px; border-radius:6px; font-weight:500; }
.badge-detour { background:rgba(56,189,248,0.12); color:var(--accent3); border:1px solid rgba(56,189,248,0.2); }

.rc-addr { font-size:0.72rem; color:var(--muted); margin-bottom:4px; }
.rc-phone { font-size:0.72rem; color:var(--muted); }

/* v2.1: 버튼 2개 */
.rc-actions { display:flex; gap:6px; margin-top:10px; }
.btn-rc {
  flex:1; padding:9px 6px; border-radius:8px; font-size:0.75rem;
  font-family:'Noto Sans KR',sans-serif; cursor:pointer; transition:all 0.15s;
  display:flex; align-items:center; justify-content:center; gap:4px;
}
.btn-navi { background:#3A1D94; border:none; color:#fff; font-weight:500; }
.btn-navi:hover { background:#4c28c4; }
.btn-kakaomap { background:var(--surface); border:1px solid var(--border); color:var(--muted); font-weight:500; }
.btn-kakaomap:hover { border-color:#FFCD00; color:#FFCD00; }

.empty-result {
  text-align:center; padding:40px 20px; color:var(--muted); font-size:0.82rem; line-height:2;
}
.empty-icon { font-size:2.5rem; margin-bottom:10px; opacity:0.4; }

/* ── 로딩 ── */
.loading {
  position:absolute; inset:0; background:rgba(10,15,13,0.88);
  display:none; flex-direction:column; align-items:center; justify-content:center; z-index:40; gap:12px;
}
.loading.show { display:flex; }
.spinner {
  width:36px; height:36px; border:3px solid var(--border);
  border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }
.loading-text { color:var(--muted); font-size:0.82rem; }
.oil-spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(74,222,128,0.2); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-right:6px; }
@keyframes spin { to { transform:rotate(360deg); } }
#oilLoadingBar { display:none; align-items:center; padding:6px 16px; font-size:0.78rem; color:var(--muted); background:var(--surface); border-bottom:1px solid var(--border); }

/* v2.1: 토스트 메시지 */
.toast {
  position:fixed; bottom:160px; left:50%; transform:translateX(-50%) translateY(20px);
  background:rgba(26,36,28,0.97); border:1px solid var(--border);
  border-radius:10px; padding:10px 18px; font-size:0.82rem;
  color:var(--text); z-index:500; opacity:0;
  transition:all 0.25s ease; pointer-events:none; white-space:nowrap;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* 스크롤바 */
.bottom::-webkit-scrollbar { width:3px; }
.bottom::-webkit-scrollbar-track { background:transparent; }
.bottom::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
.sheet::-webkit-scrollbar { width:3px; }
.sheet::-webkit-scrollbar-track { background:transparent; }
.sheet::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

/* ── 내 장소 모달 ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.7);
  z-index:200; display:none; align-items:flex-end; justify-content:center;
}
.modal-overlay.show { display:flex; }
.modal {
  background:var(--bg); border-radius:20px 20px 0 0;
  width:100%; max-width:480px; max-height:85vh;
  display:flex; flex-direction:column; border-top:1px solid var(--border);
  animation:slideUp 0.3s cubic-bezier(0.4,0,0.2,1);
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-head {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px 10px; border-bottom:1px solid var(--border); flex-shrink:0;
}
.modal-title { font-family:'Black Han Sans',sans-serif; font-size:1.05rem; color:var(--accent); letter-spacing:1px; }
.modal-body { flex:1; overflow-y:auto; padding:0 16px 24px; }

.tabs { display:flex; gap:6px; margin:14px 0; }
.tab {
  flex:1; padding:8px; border:1px solid var(--border); background:var(--card);
  color:var(--muted); border-radius:10px; font-family:'Noto Sans KR',sans-serif;
  font-size:0.8rem; cursor:pointer; text-align:center; transition:all 0.15s;
}
.tab.on { border-color:var(--accent); color:var(--accent); background:rgba(74,222,128,0.08); }

.place-list { display:flex; flex-direction:column; gap:6px; }
.place-item {
  display:flex; align-items:center; gap:10px; background:var(--card);
  border:1px solid var(--border); border-radius:10px; padding:10px 12px; transition:all 0.15s;
}
.place-item:hover { border-color:var(--accent3); }
.place-icon { font-size:1.3rem; flex-shrink:0; }
.place-info { flex:1; min-width:0; }
.place-name { font-weight:500; font-size:0.88rem; }
.place-addr { font-size:0.72rem; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.btn-place-del { background:none; border:none; color:var(--muted); cursor:pointer; font-size:0.9rem; padding:4px; transition:color 0.15s; flex-shrink:0; }
.btn-place-del:hover { color:var(--danger); }

.place-empty { text-align:center; padding:32px 16px; color:var(--muted); font-size:0.82rem; line-height:1.9; }
.place-empty-icon { font-size:2rem; margin-bottom:8px; }

.add-place-form { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px; }
.form-label { font-size:0.78rem; color:var(--muted); margin-bottom:8px; display:block; }
.icon-picker { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
.icon-opt {
  width:36px; height:36px; border:1.5px solid var(--border); border-radius:8px;
  background:var(--card); font-size:1.1rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all 0.15s;
}
.icon-opt.on { border-color:var(--accent); background:rgba(74,222,128,0.15); }
.add-place-input {
  width:100%; background:var(--card); border:1px solid var(--border); border-radius:8px;
  padding:9px 12px; color:var(--text); font-family:'Noto Sans KR',sans-serif;
  font-size:0.85rem; outline:none; margin-bottom:8px; transition:border-color 0.2s;
}
.add-place-input:focus { border-color:var(--accent); }
.add-place-input::placeholder { color:var(--muted); }
.btn-add-place {
  width:100%; padding:10px; background:var(--accent); border:none;
  border-radius:8px; color:#0a0f0d; font-family:'Black Han Sans',sans-serif;
  font-size:0.9rem; letter-spacing:1px; cursor:pointer; margin-top:4px;
}

/* v2.3: 장소 편집 */
.btn-place-edit { background:none; border:none; color:var(--muted); cursor:pointer; font-size:0.9rem; padding:4px; transition:color 0.15s; flex-shrink:0; }
.btn-place-edit:hover { color:var(--accent3); }
.edit-place-form {
  background:var(--surface); border:1px solid var(--accent3);
  border-radius:12px; padding:14px; margin-top:6px;
  animation:fadeUp 0.2s ease both;
}
.edit-btns { display:flex; gap:8px; margin-top:8px; }
.btn-edit-save {
  flex:1; padding:9px; background:var(--accent3); border:none;
  border-radius:8px; color:#000; font-family:'Black Han Sans',sans-serif; font-size:0.82rem; cursor:pointer;
}
.btn-edit-cancel {
  padding:9px 14px; background:var(--card); border:1px solid var(--border);
  border-radius:8px; color:var(--muted); font-family:'Noto Sans KR',sans-serif; font-size:0.82rem; cursor:pointer;
}

/* v2.4: PWA 설치 모달 */
.pwa-modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.75);
  z-index:400; display:none; align-items:center; justify-content:center;
  padding:24px;
}
.pwa-modal-overlay.show { display:flex; }
.pwa-modal {
  background:var(--card); border:1px solid var(--accent);
  border-radius:20px; padding:28px 24px; width:100%; max-width:320px;
  text-align:center; animation:fadeUp 0.25s ease both;
}
.pwa-modal-icon { font-size:3rem; margin-bottom:10px; }
.pwa-modal-title { font-family:'Black Han Sans',sans-serif; font-size:1.2rem; color:var(--accent); letter-spacing:1px; margin-bottom:20px; }
.btn-pwa-install {
  width:100%; padding:14px; background:var(--accent); border:none;
  border-radius:12px; color:#0a0f0d; font-family:'Black Han Sans',sans-serif;
  font-size:0.92rem; letter-spacing:1px; cursor:pointer; transition:all 0.2s;
}
.btn-pwa-install:hover { background:#6ee79d; }
.btn-pwa-install:active { transform:scale(0.98); }
</style>
</head>
<body>
<div class="app">

  <!-- ── HEADER ── -->
  <div class="header">
    <div class="logo">
      <span class="logo-main">가는 길에</span>
      <span class="logo-sub">DROPBY <span style="font-size:0.65rem;opacity:0.6;letter-spacing:0">v4.2.18</span></span>
    </div>
    <button class="btn-header" onclick="openPlacesModal()">📌 내 장소</button>
  </div>

  <!-- ── MAP ── -->
  <div id="map">
    <div class="map-empty" id="mapEmpty">
      <div class="map-empty-icon">🗺️</div>
      <div class="map-empty-text">출발지와 목적지를 입력하고<br>가는 길에 들를 곳을 찾아보세요</div>
    </div>
    <button class="btn-map-close" onclick="closeMapFullscreen()">✕</button>
    <div class="map-stats" id="mapStats">
      <div class="mstat"><div class="mstat-val" id="sDist">-</div><div class="mstat-label">경로 거리</div></div>
      <div class="mstat"><div class="mstat-val" id="sTime">-</div><div class="mstat-label">소요시간</div></div>
      <div class="mstat"><div class="mstat-val" id="sFound">-</div><div class="mstat-label">발견 장소</div></div>
    </div>
  </div>

  <!-- ── BOTTOM WRAP (스크롤 영역 + 고정 버튼) ── -->
  <div class="bottom-wrap" id="bottomWrap">

    <!-- 스크롤 영역 -->
    <div class="bottom" id="bottom">
      <div class="handle"><div class="handle-bar"></div></div>

      <!-- 경로 입력 -->
      <div class="section">
        <div class="section-label">📍 경로</div>
        <div class="route-row">
          <div class="rdot s"></div>
          <div class="iw">
            <input class="fi" id="fi-start" placeholder="출발지" autocomplete="off">
            <div class="fi-btns">
              <button class="btn-fav-pick" onclick="toggleFavPicker('start')" title="내 장소에서 선택">⭐</button>
            </div>
            <div class="ac-list" id="ac-start"></div>
            <div class="fav-picker" id="fav-start"></div>
          </div>
          <button class="btn-loc" id="btnLoc" onclick="useCurrentLocation()" title="현재 위치">📍</button>
        </div>
        <div class="route-row" style="margin-top:8px;">
          <div class="rdot e"></div>
          <div class="iw">
            <input class="fi" id="fi-end" placeholder="목적지" autocomplete="off">
            <div class="fi-btns">
              <button class="btn-fav-pick" onclick="toggleFavPicker('end')" title="내 장소에서 선택">⭐</button>
            </div>
            <div class="ac-list" id="ac-end"></div>
            <div class="fav-picker" id="fav-end"></div>
          </div>
          <button class="btn-swap" onclick="swapRoute()" title="출발/도착 바꾸기">⇅</button>
        </div>
      </div>

      <!-- 카테고리 -->
      <div class="section">
        <div class="section-label">🎯 무엇을 찾을까?</div>
        <div class="cat-scroll">
          <div class="cat-chip" data-cat="FD6" onclick="toggleCat(this)"><span class="icon">🍜</span>맛집</div>
          <div class="cat-chip" data-cat="CE7" onclick="toggleCat(this)"><span class="icon">☕</span>카페</div>
          <div class="cat-chip" data-cat="CS2" onclick="toggleCat(this)"><span class="icon">🏪</span>편의점</div>
          <div class="cat-chip" data-cat="PM9" onclick="toggleCat(this)"><span class="icon">💊</span>약국</div>
          <div class="cat-chip" data-cat="OL7" onclick="toggleCat(this)"><span class="icon">⛽</span>주유소</div>
          <div class="cat-chip" data-cat="BK9" onclick="toggleCat(this)"><span class="icon">🏦</span>은행·ATM</div>
          <div class="cat-chip" data-cat="MT1" onclick="toggleCat(this)"><span class="icon">🛒</span>마트</div>
          <div class="cat-chip" data-cat="AT4" onclick="toggleCat(this)"><span class="icon">🏛️</span>명소</div>
          <div class="cat-chip" data-cat="AD5" onclick="toggleCat(this)"><span class="icon">🏨</span>숙박</div>
          <div class="cat-chip" data-cat="SW8" onclick="toggleCat(this)"><span class="icon">🚉</span>역·터미널</div>
        </div>
      </div>

      <!-- 우회 시간 -->
      <div class="section" style="padding-bottom:4px;">
        <div style="display:flex; align-items:center; gap:10px; padding:4px 0 8px;">
          <span style="font-size:0.78rem; color:var(--muted); white-space:nowrap;">🔍 경로상 탐색범위</span>
          <input type="range" id="detourSlider" min="1" max="3" step="0.01" value="1.2"
            oninput="updateDetour(this.value)" style="flex:1;">
          <span id="detourVal" style="color:var(--accent);font-size:0.82rem;white-space:nowrap;min-width:36px;text-align:right;">좁게</span>
        </div>
      </div>
    </div>

    <!-- v2.1: 고정 찾기 버튼 -->
    <div class="cta-fixed">
      <button class="btn-search" id="btnSearch" onclick="doSearch()">
        <span>🔍</span><span>가는 길에 찾기</span>
      </button>
    </div>
  </div>

  <!-- ── 결과 시트 ── -->
  <div class="sheet" id="sheet">
    <div class="sheet-head">
      <div>
        <span class="sheet-title">발견된 장소</span>
        <span class="sheet-count" id="sheetCount"></span>
      </div>
      <button class="btn-close" onclick="closeSheet()">✕</button>
    </div>
    <!-- v4.0.0: 카테고리 서브탭 (카테고리별 조건부 노출) -->
    <div id="subTabArea" style="display:none; padding:0 14px 0; border-bottom:1px solid var(--border);">
      <div id="subTabRow" class="tabs" style="margin:10px 0 8px; overflow-x:auto; flex-wrap:nowrap; scrollbar-width:none;"></div>
    </div>
    <div id="oilLoadingBar"><span class="oil-spinner"></span>유가 정보 조회 중...</div>
    <!-- v4.0.0: 약국 야간 배너 (야간·공휴일 조건부 노출) -->
    <div id="pharmacyBanner" style="display:none; padding:10px 14px; background:rgba(251,146,60,0.12); border-bottom:1px solid rgba(251,146,60,0.3);">
      <span style="font-size:0.78rem; color:#fb923c;">⚠️ 지금 문을 열었는지 꼭 확인하고 가세요.</span>
    </div>
    <!-- v4.2.17: 졸음쉼터 배너 (경로 2시간 초과 시) -->
    <div id="drowsyBanner" style="display:none; padding:10px 14px; background:rgba(56,189,248,0.10); border-bottom:1px solid rgba(56,189,248,0.25);">
      <span id="drowsyBannerText" style="font-size:0.78rem; color:#38bdf8;">💤 경로 상 졸음쉼터를 확인하는 중...</span>
    </div>
    <div class="result-list" id="resultList"></div>
  </div>

  <!-- 토스트 -->
  <div class="toast" id="toast"></div>

  <!-- 로딩 -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">경로 계산 중...</div>
  </div>

</div>

<!-- v2.4: PWA 설치 모달 -->
<div class="pwa-modal-overlay" id="pwaBanner" onclick="handlePwaOverlayClick(event)">
  <div class="pwa-modal">
    <div class="pwa-modal-icon">🗺️</div>
    <div class="pwa-modal-title">가는 길에</div>
    <button class="btn-pwa-install" id="btnPwaInstall">설치 (주소창 없이 전체화면)</button>
  </div>
</div>

<!-- 내 장소 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">📌 내 장소</div>
      <div style="display:flex;align-items:center;gap:6px;">
        <button class="btn-header" onclick="exportPlaces()" title="내보내기">📤</button>
        <button class="btn-header" onclick="importPlaces()" title="가져오기">📥</button>
        <button class="btn-close" onclick="closePlacesModal()">✕</button>
      </div>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
// 설정
// ─────────────────────────────────────────
const KAKAO_KEY = '4d1307b368487f762cb7e2681ede2435';
const KAKAO_REST_KEY = 'b3d949996b321a676a0480e24b264a52';
const LS_PLACES = 'dropby_places_v1';
const ICONS = ['🏠','🌳','🍜','☕','⛽','🏪','🏥','🏋️','📍','🎯','🏖️','🏔️','🛒','🎠','🏢','🏫','💼','📖'];

let kakaoReady = false;
let myCurrentLat = null;
let myCurrentLng = null;
let kakaoMap = null;
let ps = null;
let geocoder = null;
let markers = [];
let placeMarkers = []; // 장소 마커 (출발/도착 제외)
let polyline = null;
let coords = {};
let acTimers = {};
let selectedIcon = '📍';
let addPlaceCoords = null;
let addPlaceAcTimer = null;

// ─────────────────────────────────────────
// localStorage
// ─────────────────────────────────────────
function loadPlaces() {
  try {
    const places = JSON.parse(localStorage.getItem(LS_PLACES)) || [];
    return places.sort((a, b) => {
      const aKo = /^[가-힣]/.test(a.name);
      const bKo = /^[가-힣]/.test(b.name);
      if (aKo && !bKo) return -1;
      if (!aKo && bKo) return 1;
      return a.name.localeCompare(b.name, 'ko');
    });
  } catch { return []; }
}
function savePlaces(arr) { localStorage.setItem(LS_PLACES, JSON.stringify(arr)); }

// ─────────────────────────────────────────
// 토스트
// ─────────────────────────────────────────
let toastTimer = null;
function showToast(msg, duration = 500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

// ─────────────────────────────────────────
// 초기화
// ─────────────────────────────────────────
function loadKakaoSDK() {
  return new Promise((resolve, reject) => {
    if (window.kakao && window.kakao.maps) { resolve(); return; }
    const s = document.createElement('script');
    s.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_KEY}&libraries=services&autoload=false`;
    s.onload = () => kakao.maps.load(resolve);
    s.onerror = () => reject(new Error('카카오 SDK 로드 실패'));
    document.head.appendChild(s);
  });
}

async function initApp() {
  // 헤더 높이만큼 map 상단 여백 동적 설정 (새로고침 포함)
  function adjustMapTop() {
    const h = document.querySelector('.header');
    const m = document.getElementById('map');
    if (h && m) m.style.paddingTop = h.offsetHeight + 'px';
  }
  adjustMapTop();
  window.addEventListener('resize', adjustMapTop);

  showToast('지도 로딩 중...');
  try {
    await loadKakaoSDK();
    kakaoReady = true;
    const container = document.getElementById('map');
    kakaoMap = new kakao.maps.Map(container, { center: new kakao.maps.LatLng(36.5, 127.5), level: 13 });
    ps = new kakao.maps.services.Places();
    geocoder = new kakao.maps.services.Geocoder();
    kakao.maps.event.addListener(kakaoMap, 'click', openMapFullscreen);
    // map div 직접 클릭도 전체화면 (마커가 이벤트 막는 경우 대비)
    document.getElementById('map').addEventListener('click', function(e) {
      if (e.target.closest('.btn-map-close')) return;
      if (e.target.tagName === 'CANVAS') openMapFullscreen(); // 카카오 지도 캔버스 직접 클릭
    });
    if (window.Kakao && !Kakao.isInitialized()) Kakao.init(KAKAO_KEY);
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(pos => {
        myCurrentLat = pos.coords.latitude;
        myCurrentLng = pos.coords.longitude;
        kakaoMap.setCenter(new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude));
        kakaoMap.setLevel(8);
        reverseGeocode(pos.coords.latitude, pos.coords.longitude, addr => {
          document.getElementById('fi-start').value = addr;
          coords[addr] = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        });
      });
    }
    setupInputs();
    setupBackGuard();
    // 디폴트 카테고리 설정 (원하는 data-cat 값으로 변경, 없애려면 아래 document 코드 삭제)
    document.querySelector('.cat-chip[data-cat="FD6"]')?.click();
  } catch(e) {
    showToast('⚠️ 지도 로드 실패');
  }
}

// ─────────────────────────────────────────
// 현재 위치
// ─────────────────────────────────────────
function useCurrentLocation() {
  if (!navigator.geolocation) { alert('위치 서비스를 사용할 수 없습니다.'); return; }
  const btn = document.getElementById('btnLoc');
  btn.classList.add('spinning'); btn.disabled = true;
  navigator.geolocation.getCurrentPosition(
    pos => {
      myCurrentLat = pos.coords.latitude;
      myCurrentLng = pos.coords.longitude;
      btn.classList.remove('spinning'); btn.disabled = false;
      reverseGeocode(pos.coords.latitude, pos.coords.longitude, addr => {
        document.getElementById('fi-start').value = addr;
        coords[addr] = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      });
    },
    err => { btn.classList.remove('spinning'); btn.disabled = false; alert('위치 오류: ' + err.message); },
    { enableHighAccuracy: true, timeout: 15000 }
  );
}

function reverseGeocode(lat, lng, cb) {
  if (!geocoder) { cb('현재 위치'); return; }
  geocoder.coord2Address(lng, lat, (result, status) => {
    if (status === kakao.maps.services.Status.OK && result.length) {
      const addr = result[0].road_address
        ? result[0].road_address.address_name
        : result[0].address.address_name;
      cb(addr);
    } else cb('현재 위치');
  });
}

// ─────────────────────────────────────────
// 출발 / 도착 역전
// ─────────────────────────────────────────
// 장소 마커 그리기 (주유소는 유종 필터링 + 공급사/가격 표시)
function drawPlaceMarkers(places) {
  // 기존 장소 마커만 제거 (출발/도착 마커 유지)
  placeMarkers.forEach(m => m.setMap(null));
  placeMarkers = [];

  // 주유소 카테고리 단독 선택 시 유종 필터링
  const isOL7Only = currentSingleCat === 'OL7';
  const displayPlaces = isOL7Only
    ? places.filter(p => p.catCode !== 'OL7' || p._oilPrice)
    : places;

  displayPlaces.forEach(p => {
    const overlayDiv = document.createElement('div');
    overlayDiv.style.cssText = 'background:#1a241c;border:1.5px solid #4ade80;color:#4ade80;padding:3px 7px;border-radius:8px;font-size:10px;font-family:sans-serif;box-shadow:0 2px 6px rgba(0,0,0,0.5);white-space:nowrap;cursor:pointer;line-height:1.4;';
    // 주유소는 공급사 + 가격 표시
    if (p.catCode === 'OL7') {
      const supplier = p._pollDiv ? (POLL_DIV_MAP[p._pollDiv] || p._pollDiv) : '⛽';
      const price = p._oilPrice ? p._oilPrice.toLocaleString() + '원' : '';
      overlayDiv.textContent = supplier + (price ? ' ' + price : '');
    } else {
      overlayDiv.textContent = p.icon + ' ' + p.name;
    }
    overlayDiv.addEventListener('click', () => goToCard(p.id));
    overlayDiv.addEventListener('touchstart', (e) => {
      if (e.touches.length > 1) return;
      overlayDiv._isTap = true;
      e.stopPropagation();
    }, { passive: true });
    overlayDiv.addEventListener('touchmove', () => { overlayDiv._isTap = false; }, { passive: true });
    overlayDiv.addEventListener('touchend', (e) => {
      if (e.changedTouches.length > 1) return;
      if (!overlayDiv._isTap) return;
      e.preventDefault();
      e.stopPropagation();
      goToCard(p.id);
    });
    const overlay = new kakao.maps.CustomOverlay({
      map: kakaoMap,
      position: new kakao.maps.LatLng(p.lat, p.lng),
      content: overlayDiv,
      yAnchor: 1.4
    });
    placeMarkers.push(overlay);
  });
}

function goToCard(placeId) {
  closeMapFullscreen();
  // 지도 fullscreen transition(300ms) 완료 후 시트 열기
  setTimeout(() => {
    document.getElementById('sheet').classList.add('open');
    setTimeout(() => {
      const card = document.getElementById('card-' + placeId);
      if (card) {
        const scrollEl = document.getElementById('sheet');
        const cardTop = card.offsetTop;
        const offset = card.offsetHeight * 0.6;
        scrollEl.scrollTo({ top: cardTop - offset, behavior: 'smooth' });
        card.classList.add('highlight');
        setTimeout(() => card.classList.remove('highlight'), 1500);
      }
    }, 200);
  }, 320);
}

function swapRoute() {
  const sEl = document.getElementById('fi-start');
  const eEl = document.getElementById('fi-end');
  const sVal = sEl.value, eVal = eEl.value;
  const sc = coords[sVal], ec = coords[eVal];
  sEl.value = eVal; eEl.value = sVal;
  if (ec) coords[eVal] = ec;
  if (sc) coords[sVal] = sc;
}

// ─────────────────────────────────────────
// 자동완성
// ─────────────────────────────────────────
function setupInputs() {
  setupAC('fi-start', 'ac-start');
  setupAC('fi-end', 'ac-end');
  document.getElementById('fi-start').addEventListener('focus', closeAllPickers);
  document.getElementById('fi-end').addEventListener('focus', closeAllPickers);
}

function setupAC(inputId, acId) {
  const input = document.getElementById(inputId);
  const acEl = document.getElementById(acId);
  let isComposing = false;
  input.addEventListener('compositionstart', () => isComposing = true);
  input.addEventListener('compositionend', () => {
    isComposing = false;
    clearTimeout(acTimers[inputId]);
    acTimers[inputId] = setTimeout(() => searchAC(input.value.trim(), acEl, input), 50);
  });
  input.addEventListener('input', () => { if (isComposing) return; triggerAC(input, acEl, inputId); });
  input.addEventListener('blur', () => setTimeout(() => acEl.style.display = 'none', 200));
}

function triggerAC(input, acEl, key) {
  clearTimeout(acTimers[key]);
  const val = input.value.trim();
  if (val.length < 1) { acEl.style.display = 'none'; return; }
  acTimers[key] = setTimeout(() => searchAC(val, acEl, input), 100);
}

function searchAC(query, acEl, input) {
  if (!ps) return;
  ps.keywordSearch(query, (data, status) => {
    if (status !== kakao.maps.services.Status.OK || !data.length) { acEl.style.display = 'none'; return; }
    acEl.innerHTML = '';
    data.slice(0, 7).forEach(p => {
      const item = document.createElement('div');
      item.className = 'ac-item';
      const info = document.createElement('div');
      info.className = 'ac-info';
      info.innerHTML = `<div class="ac-name">${p.place_name}</div><div class="ac-addr">${p.road_address_name || p.address_name}</div>`;
      const pin = document.createElement('button');
      pin.className = 'ac-save'; pin.textContent = '📌'; pin.title = '내 장소로 저장';
      pin.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); saveToMyPlace(p); });
      item.appendChild(info); item.appendChild(pin);
      item.addEventListener('mousedown', e => {
        if (e.target === pin) return;
        e.preventDefault();
        input.value = p.place_name;
        coords[p.place_name] = { lat: parseFloat(p.y), lng: parseFloat(p.x) };
        acEl.style.display = 'none';
      });
      acEl.appendChild(item);
    });
    acEl.style.display = 'block';
  });
}

function toggleFavPicker(type) {
  const picker = document.getElementById('fav-' + type);
  const isOpen = picker.classList.contains('show');
  closeAllPickers();
  if (!isOpen) { renderFavPicker(picker, type); picker.classList.add('show'); }
}

function closeAllPickers() {
  document.querySelectorAll('.fav-picker').forEach(p => p.classList.remove('show'));
}

function renderFavPicker(picker, type) {
  const places = loadPlaces();
  if (!places.length) {
    picker.innerHTML = `<div class="fav-picker-empty">저장된 장소가 없어요<br><small>📌 내 장소에서 추가하세요</small></div>`;
    return;
  }
  picker.innerHTML = places.map((p, i) => `
    <div class="fav-pick-item" onclick="selectFavPlace('${type}',${i})">
      <div class="fav-pick-icon">${p.icon}</div>
      <div><div class="fav-pick-name">${p.name}</div><div class="fav-pick-addr">${p.addr}</div></div>
    </div>`).join('');
}

function selectFavPlace(type, idx) {
  const p = loadPlaces()[idx]; if (!p) return;
  const inputId = type === 'start' ? 'fi-start' : 'fi-end';
  document.getElementById(inputId).value = p.name;
  if (p.lat && p.lng) coords[p.name] = { lat: p.lat, lng: p.lng };
  closeAllPickers();
}

document.addEventListener('click', e => { if (!e.target.closest('.iw')) closeAllPickers(); });

// ─────────────────────────────────────────
// 자동완성에서 내 장소 저장
// ─────────────────────────────────────────
function saveToMyPlace(p) {
  const places = loadPlaces();
  const name = p.place_name;
  if (places.some(x => x.name === name)) { showToast(`"${name}"은 이미 저장되어 있어요`); return; }
  places.push({ icon: '📍', name, addr: p.road_address_name || p.address_name, lat: parseFloat(p.y), lng: parseFloat(p.x) });
  savePlaces(places);
  coords[name] = { lat: parseFloat(p.y), lng: parseFloat(p.x) };
  showToast(`✅ "${name}" 내 장소로 저장!`, 750);
}

// 현재 활성 서브탭 인덱스 (카테고리별)
let activeSubTab = {};
// 현재 표시 중인 전체 결과 (서브탭 필터용)
let currentPlaces = [];
// 현재 단일 카테고리 코드 (서브탭 표시 여부 판단용)
let currentSingleCat = null;
// v4.2.17: 주유소 저가순 정렬 토글
let ol7SortByPrice = true;  // 디폴트 저가순
let ol7FuelType = 'B027';   // 디폴트 휘발유 (B034=고급휘발유, D047=경유, K015=LPG)

// v4.2.17: 서브탭 렌더링 (0개 탭 자동 숨김)
function renderSubTabs(catCode, places) {
  const area = document.getElementById('subTabArea');
  const row  = document.getElementById('subTabRow');
  const tabs = CAT_SUBTABS[catCode];

  if (!tabs) { area.style.display = 'none'; return; }

  area.style.display = '';
  row.innerHTML = '';
  const curIdx = activeSubTab[catCode] ?? 0;

  // 보이는 탭 수 미리 계산 (5개 이하: flex균등, 6개 이상: flex:0 스크롤)
  const visibleCount = tabs.filter((t, i) => i === 0 || places.filter(p => t.filterFn(p)).length > 0).length;
  const tabFlex = visibleCount <= 5 ? '1' : '0 0 auto';

  tabs.forEach((t, i) => {
    // 전체 탭은 항상 노출, 나머지는 해당 결과가 1개 이상일 때만 노출
    if (i !== 0 && places.filter(p => t.filterFn(p)).length === 0) return;
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === curIdx ? ' on' : '');
    btn.style.cssText = `white-space:nowrap; flex-shrink:0; flex:${tabFlex};`;
    btn.textContent = t.label;
    btn.onclick = () => {
      activeSubTab[catCode] = i;
      renderSubTabs(catCode, places);
      applySubTabFilter(catCode, places);
    };
    row.appendChild(btn);
  });

  // 주유소: 유종 드롭다운 추가
  if (catCode === 'OL7') {
    // 기존 탭 row 대신 유종 드롭다운 + 저가순/거리순 탭 구성
    row.innerHTML = '';
    // 유종 드롭다운
    const sel = document.createElement('select');
    sel.id = 'ol7FuelSel';
    sel.style.cssText = 'background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:4px 8px;font-size:0.82rem;cursor:pointer;flex:1;';
    [['B034','고급휘발유'],['B027','휘발유'],['D047','경유'],['K015','LPG']].forEach(([val, label]) => {
      const opt = document.createElement('option');
      opt.value = val; opt.textContent = label;
      if (val === ol7FuelType) opt.selected = true;
      sel.appendChild(opt);
    });
    sel.onchange = async () => {
      ol7FuelType = sel.value;
      // 유종 변경 시 재조회
      await reloadOpinetPrices(places);
      renderSubTabs(catCode, places);
      applySubTabFilter(catCode, places);
    };
    row.appendChild(sel);
    // 저가순/거리순 탭
    const tabIdx = activeSubTab['OL7'] ?? 0;
    [['저가순', 0],['거리순', 1]].forEach(([label, idx]) => {
      const btn = document.createElement('button');
      btn.className = 'tab' + (tabIdx === idx ? ' on' : '');
      btn.style.cssText = 'white-space:nowrap; flex:1;';
      btn.textContent = label;
      btn.onclick = () => {
        activeSubTab['OL7'] = idx;
        ol7SortByPrice = idx === 0;
        renderSubTabs(catCode, places);
        applySubTabFilter(catCode, places);
      };
      row.appendChild(btn);
    });
  }
}

// v4.0.0: 서브탭 필터 적용 후 카드 재렌더
function applySubTabFilter(catCode, places) {
  const tabs = CAT_SUBTABS[catCode];
  if (!tabs) { renderCards(places); return; }
  const idx = activeSubTab[catCode] ?? 0;
  let filtered = places.filter(p => tabs[idx].filterFn(p));
  if (catCode === 'OL7') {
    // LPG 선택 시 LPG 충전소만, 아니면 LPG 제외
    if (ol7FuelType === 'K015') {
      filtered = filtered.filter(p => /LPG|충전소/.test(p.catName));
    } else {
      filtered = filtered.filter(p => !/LPG|충전소/.test(p.catName));
    }
    // 저가순/거리순 정렬
    if (ol7SortByPrice) {
      filtered = [...filtered].sort((a, b) => {
        if (a._oilPrice && b._oilPrice) return a._oilPrice - b._oilPrice;
        if (a._oilPrice) return -1;
        if (b._oilPrice) return 1;
        return a.fromStartMin - b.fromStartMin;
      });
    } else {
      filtered = [...filtered].sort((a, b) => a.fromStartMin - b.fromStartMin);
    }
  }
  renderCards(filtered);
  document.getElementById('sheetCount').textContent = `${filtered.length}곳 발견`;
}

// v4.0.0: 약국 야간 배너 (20시~익일 9시 또는 일요일·토요일)
function shouldShowPharmacyBanner() {
  const now = new Date();
  const h = now.getHours();
  const day = now.getDay(); // 0=일, 6=토
  if (day === 0 || day === 6) return true; // 주말
  if (h >= 20 || h < 9) return true;       // 야간
  return false;
}

            r({ lat: parseFloat(d[0].y), lng: parseFloat(d[0].x) });
          else r(null);
        });
      }),
      new Promise(r => {

          else r(null);
        });

// ─────────────────────────────────────────
// v4.2.17: 카카오모빌리티 다중목적지 경로 취득 (waypoints 지원)
// ─────────────────────────────────────────
async function getRoadRoute(startC, endC, waypointCs = []) {
  let url = `https://apis-navi.kakaomobility.com/v1/directions?origin=${startC.lng},${startC.lat}&destination=${endC.lng},${endC.lat}&priority=RECOMMEND`;
  if (waypointCs.length > 0) {
    const wpStr = waypointCs.map(w => `${w.lng},${w.lat}`).join('|');
    url += `&waypoints=${encodeURIComponent(wpStr)}`;
  }
  let res;
  try {
    res = await fetch(url, { headers: { Authorization: `KakaoAK ${KAKAO_REST_KEY}` } });
  } catch(e) {
    throw new Error('NETWORK_ERROR');
  }
  if (res.status === 429) throw new Error('KAKAO_QUOTA');
  if (!res.ok) throw new Error('경로 API 오류: ' + res.status);
  const data = await res.json();
  if (!data.routes || !data.routes[0] || data.routes[0].result_code !== 0) {
    throw new Error('경로를 찾을 수 없습니다: ' + (data.routes?.[0]?.result_msg || ''));
  }
  const route = data.routes[0];
  const coords = [];
  // v4.2.17: 고속도로 구간 좌표 마킹 (guides type 10~12=진입, 7~9=출구, 84=톨게이트)
  const highwayCoordSet = new Set();
  let inHighway = false;
  for (const section of route.sections) {
    for (const guide of (section.guides || [])) {
      const t = guide.type;
      if ([10,11,12,84].includes(t)) inHighway = true;
      if ([7,8,9].includes(t)) inHighway = false;
    }
    for (const road of section.roads) {
      const verts = road.vertexes;
      for (let i = 0; i < verts.length; i += 2) {
        const pt = { lng: verts[i], lat: verts[i+1], highway: inHighway };
        coords.push(pt);
        if (inHighway) highwayCoordSet.add(`${verts[i]},${verts[i+1]}`);
      }
    }
  }
  const totalSec = route.summary.duration;
  const totalDist = route.summary.distance;
  return { coords, totalSec, totalDist, highwayCoordSet };
}

// v4.2.17: 좌표가 고속도로 구간인지 확인
function isHighwayPoint(pt, highwayCoordSet) {
  return pt.highway === true || highwayCoordSet?.has(`${pt.lng},${pt.lat}`);
}

// v3.1: 경로 좌표를 실제 거리 기준으로 균등하게 샘플링
function sampleRoutePoints(coords, totalDist, maxPoints = 10) {
  if (coords.length <= maxPoints) return coords;
  // 총 거리를 maxPoints 구간으로 나눠서 균등 간격 포인트 추출
  const interval = totalDist / maxPoints; // 미터 단위
  const pts = [coords[0]];
  let accumulated = 0;
  let nextTarget = interval;
  for (let i = 1; i < coords.length; i++) {
    const d = distKm(coords[i-1], coords[i]) * 1000;
    accumulated += d;
    if (accumulated >= nextTarget) {
      pts.push(coords[i]);
      nextTarget += interval;
    }
  }
  // 마지막 포인트 항상 포함
  const last = coords[coords.length-1];
  if (pts[pts.length-1] !== last) pts.push(last);

  // v4.2.17: 목적지 직전 25km 지점 명시적 추가 (고속도로 경로 목적지 부근 커버)
  // 경로가 50km 이상일 때만 적용 (단거리는 이미 커버됨)
  if (totalDist >= 50000) {
    const targetDist = totalDist - 25000; // 목적지 25km 전
    let acc2 = 0;
    let nearPoint = null;
    let minDiff = Infinity;
    for (let i = 1; i < coords.length; i++) {
      acc2 += distKm(coords[i-1], coords[i]) * 1000;
      const diff = Math.abs(acc2 - targetDist);
      if (diff < minDiff) { minDiff = diff; nearPoint = coords[i]; }
    }
    // 이미 근처 포인트가 없을 때만 추가 (중복 방지: 5km 이내 기존 포인트 없으면 추가)
    if (nearPoint) {
      const alreadyCovered = pts.some(p => distKm(p, nearPoint) * 1000 < 5000);
      if (!alreadyCovered) pts.push(nearPoint);
    }
  }

  return pts;
}

// 점과 경로(선분 배열) 사이의 최소 거리(km)
function distToRoute(point, routeCoords) {
  let minDist = Infinity;
  for (const c of routeCoords) {
    const d = distKm(point, c);
    if (d < minDist) minDist = d;
  }
  return minDist;
}

// 장소의 최근접 경로 포인트가 고속도로인지 확인
function isPlaceOnHighway(point, coords) {
  let minDist = Infinity, nearestPt = null;
  for (const c of coords) {
    const d = distKm(point, c);
    if (d < minDist) { minDist = d; nearestPt = c; }
  }
  return nearestPt?.highway === true;
}

function distKm(a, b) {
  const R = 6371, dLat = (b.lat-a.lat)*Math.PI/180, dLng = (b.lng-a.lng)*Math.PI/180;
  const h = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.asin(Math.sqrt(h));
}

// v4.0.1: 경로 좌표 기반 이탈 시간 계산 (직선 추정 → 실도로 시간 비율 분할)
// 경로상 가장 가까운 포인트까지의 누적 거리 비율로 앞/뒤 구간 시간 분할,
// 장소까지 실제 이탈 거리(왕복)를 경로 평균속도로 환산하여 합산
function calcDetourMin(startC, endC, placeC, totalSec, routeCoords, totalDist) {
  if (!routeCoords || routeCoords.length < 2 || totalDist === 0) {
    // 폴백: 직선 비율 추정
    const totalMin = totalSec / 60;
    const directKm = distKm(startC, endC);
    const viaKm = distKm(startC, placeC) + distKm(placeC, endC);
    if (directKm === 0) return 0;
    return Math.round(Math.max(0, totalMin * (viaKm - directKm) / directKm));
  }

  // 경로상 장소와 가장 가까운 포인트 인덱스 및 이탈 거리 탐색
  let minDist = Infinity;
  let nearestIdx = 0;
  for (let i = 0; i < routeCoords.length; i++) {
    const d = distKm(placeC, routeCoords[i]);
    if (d < minDist) { minDist = d; nearestIdx = i; }
  }

  // 시작~nearest 누적 거리 계산
  let accumulated = 0;
  for (let i = 1; i <= nearestIdx; i++) {
    accumulated += distKm(routeCoords[i-1], routeCoords[i]) * 1000; // 미터
  }

  // 경로 평균 속도 (m/s)
  const avgSpeedMs = totalDist / totalSec;

  // 이탈 왕복 시간 (장소까지 직선 거리 왕복, 평균속도 기준)
  const detourDistM = minDist * 1000 * 2; // 왕복
  const detourSec = detourDistM / avgSpeedMs;

  return Math.round(Math.max(0, detourSec / 60));
}

// ─────────────────────────────────────────
// v4.2.17: 다중목적지/다중출발지 API로 전체 장소 이탈시간 일괄 계산
// 출발지→[장소N] 1회 + [장소N]→목적지 1회 = 총 2회 호출
// ─────────────────────────────────────────
async function calcDetourMinBatch(startC, endC, places, totalSec) {
  if (!places.length) return;

  // 각 장소~출발지/목적지 중 최대 거리 기반 radius (직선거리 과소평가 방지)
  const maxPlaceDist = places.reduce((max, p) => {
    const d = Math.max(distKm(startC, p), distKm(endC, p)) * 1000;
    return Math.max(max, d);
  }, 0);
  const apiRadius = Math.max(5000, Math.round(maxPlaceDist * 1.3));

  const BATCH_SIZE = 30;
  const chunks = [];
  for (let i = 0; i < places.length; i += BATCH_SIZE) {
    chunks.push(places.slice(i, i + BATCH_SIZE));
  }

  for (const chunk of chunks) {
    const destinations = chunk.map((p, i) => ({ x: String(p.lng), y: String(p.lat), key: String(i) }));
    const origins = chunk.map((p, i) => ({ x: String(p.lng), y: String(p.lat), key: String(i) }));

    try {
      const [r1, r2] = await Promise.all([
        fetch('https://apis-navi.kakaomobility.com/v1/destinations/directions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `KakaoAK ${KAKAO_REST_KEY}` },
          body: JSON.stringify({ origin: { x: String(startC.lng), y: String(startC.lat) }, destinations, radius: apiRadius })
        }),
        fetch('https://apis-navi.kakaomobility.com/v1/origins/directions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `KakaoAK ${KAKAO_REST_KEY}` },
          body: JSON.stringify({ origins, destination: { x: String(endC.lng), y: String(endC.lat) }, radius: apiRadius })
        })
      ]);

      if (r1.status === 429 || r2.status === 429) throw new Error('KAKAO_QUOTA');

      const [d1, d2] = await Promise.all([r1.json(), r2.json()]);

      const toPlace = {};
      const fromPlace = {};

      (d1.routes || []).forEach((r, i) => {
        if (r.result_code === 0 && r.summary?.duration != null) {
          toPlace[String(i)] = r.summary.duration;
        }
      });
      (d2.routes || []).forEach((r, i) => {
        if (r.result_code === 0 && r.summary?.duration != null) {
          fromPlace[String(i)] = r.summary.duration;
        }
      });

      chunk.forEach((p, i) => {
        const sec1 = toPlace[String(i)];
        const sec2 = fromPlace[String(i)];
        if (sec1 != null) {
          p.fromStartMin = Math.round(sec1 / 60); // sec1만 있어도 출발지 거리 업데이트
        }
        if (sec1 != null && sec2 != null) {
          p.detourMin = Math.round(Math.max(0, (sec1 + sec2 - totalSec) / 60));
          p.detourExact = true;
        }
        // 매칭 실패 시 추정값 유지 (detourExact = false 명시)
        if (p.detourExact == null) p.detourExact = false;
      });
    } catch(e) {
      if (e.message === 'KAKAO_QUOTA') throw e;
      console.warn('다중목적지 API 오류, 추정값 유지:', e.message);
      // 오류 시 전체 chunk 추정값 유지
      chunk.forEach(p => { if (p.detourExact == null) p.detourExact = false; });
    }
  }
}

// ─────────────────────────────────────────
// v4.2.17: 카테고리별 탐색 반경 자동 확장 설정
// autoExpand: true=확장, msg: 확장 시 토스트 멘트 (null이면 멘트 없음)
// noHighway: true=고속도로 구간 제외
// rearBias: true=후반 구간 집중 (숙박: 중간~도착지)
const CAT_SEARCH_CONFIG = {
  FD6:  { autoExpand: true,  msg: null,                          noHighway: true,  rearBias: false },
  CE7:  { autoExpand: true,  msg: null,                          noHighway: true,  rearBias: false },
  CS2:  { autoExpand: true,  msg: '근처에 편의점이 없어 범위를 넓혔어요', noHighway: true,  rearBias: false },
  PM9:  { autoExpand: true,  msg: '근처에 약국이 없어 범위를 넓혔어요',   noHighway: true,  rearBias: false },
  OL7:  { autoExpand: true,  msg: '근처에 주유소가 없어 범위를 넓혔어요', noHighway: true,  rearBias: false },
  AT4:  { autoExpand: false, msg: null,                          noHighway: false, rearBias: false },
  MT1:  { autoExpand: true,  msg: null,                          noHighway: true,  rearBias: false },
  BK9:  { autoExpand: true,  msg: null,                          noHighway: true,  rearBias: false },
  AD5:  { autoExpand: false, msg: null,                          noHighway: true,  rearBias: true  }, // 중간~도착지 구간
  SW8:  { autoExpand: false, msg: null,                          noHighway: true,  rearBias: false },
};

// v4.2.17: 실제 도로 경로 기반 장소 검색
async function searchPlacesAlongRoute(startC, endC, cats, maxDetourMin, routeData) {
  const { coords, totalSec, totalDist, highwayCoordSet } = routeData;
  const maxPoints = Math.min(16, Math.max(6, Math.round(totalDist / 1000 / 10 * 2)));
  const samplePoints = sampleRoutePoints(coords, totalDist, maxPoints);
  const avgSpeedMs = totalDist / totalSec;
  const sliderRadius = avgSpeedMs * (maxDetourMin * 60) * 0.5;
  const baseRadius = Math.min(15000, Math.max(1000, sliderRadius));
  const maxPerPoint = Math.ceil(30 / samplePoints.length);
  const seen = new Set();
  const results = [];

  const cumTimeSec = [0];
  for (let i = 1; i < coords.length; i++) {
    const segDist = distKm(coords[i-1], coords[i]) * 1000;
    cumTimeSec.push(cumTimeSec[i-1] + (segDist / totalDist) * totalSec);
  }

  // v4.2.17: 저가순 토글 ON 시 슬라이더 무시하고 넓게 탐색 (기획서 3-12)
  const effectiveRadius = (ol7SortByPrice && cats.some(c => c.cat === 'OL7'))
    ? Math.min(20000, baseRadius * 3)
    : baseRadius;

  // 카테고리별로 고속도로 제외 + rearBias(숙박: 중간~도착지) 적용한 포인트 목록 생성
  const nonHighwayPoints = samplePoints.filter(p => !isHighwayPoint(p, highwayCoordSet));
  const getCatPoints = (catCode) => {
    const cfg = CAT_SEARCH_CONFIG[catCode] || {};
    // noHighway이지만 비고속도로 포인트가 너무 적으면 전체 사용 (전 구간 고속도로 경로 대응)
    let pts = (cfg.noHighway && nonHighwayPoints.length >= 2)
      ? nonHighwayPoints
      : samplePoints;
    // rearBias: 전체 포인트의 후반 50% 이후만 사용 (숙박 = 중간~도착지)
    if (cfg.rearBias && pts.length > 2) {
      pts = pts.slice(Math.floor(pts.length / 2));
    }
    return pts;
  };

  // 카카오 Places 검색 래퍼 (에러 처리 포함)
  const psSearch = (catCode, point, radius) => new Promise(resolve => {
    try {
      ps.categorySearch(catCode, (data, status, pagination) => {
        if (status === kakao.maps.services.Status.OK) resolve(data || []);
        else if (status === 'ERROR') resolve({ _error: 'KAKAO_QUOTA' });
        else resolve([]);
      }, {
        location: new kakao.maps.LatLng(point.lat, point.lng),
        radius: Math.round(radius),
        sort: kakao.maps.services.SortBy.ACCURACY
      });
    } catch(e) { resolve([]); }
  });

  // 키워드 검색 래퍼 (SW8 KTX·버스터미널용)
  const psKeyword = (keyword, point, radius) => new Promise(resolve => {
    try {
      ps.keywordSearch(keyword, (data, status) => {
        if (status === kakao.maps.services.Status.OK) resolve(data || []);
        else resolve([]);
      }, {
        location: new kakao.maps.LatLng(point.lat, point.lng),
        radius: Math.round(radius),
        sort: kakao.maps.services.SortBy.ACCURACY
      });
    } catch(e) { resolve([]); }
  });

  const addResult = (p, catMeta, sw8type = null, isCT1 = false, isDessert = false) => {
    if (seen.has(p.id)) return false;
    const filterKey = catMeta._bakery ? 'FD6_BAKERY' : catMeta._dessert ? 'FD6_DESSERT' : catMeta._ct1 ? 'CT1' : CAT_NAME_FILTER[catMeta.cat] ? catMeta.cat : null;
    if (filterKey && CAT_NAME_FILTER[filterKey] && !CAT_NAME_FILTER[filterKey](p)) return false;
    const placeC = { lat: parseFloat(p.y), lng: parseFloat(p.x) };
    const distFromRoute = distToRoute(placeC, coords);
    if (distFromRoute > effectiveRadius / 1000) return false;
    const detourMin = calcDetourMin(startC, endC, placeC, totalSec, coords, totalDist);
    if (detourMin > maxDetourMin) return false;
    let nearIdx = 0, minD = Infinity;
    for (let i = 0; i < coords.length; i++) {
      const d = distKm(placeC, coords[i]);
      if (d < minD) { minD = d; nearIdx = i; }
    }
    const fromStartMin = Math.round(cumTimeSec[nearIdx] / 60);
    seen.add(p.id);
    results.push({
      id: p.id, name: p.place_name,
      cat: catMeta.label, icon: catMeta.icon,
      catCode: sw8type ? 'SW8' : catMeta._ct1 ? 'AT4' : catMeta.cat,
      catName: p.category_name || '',
      addr: p.road_address_name || p.address_name,
      phone: p.phone || '', url: p.place_url || '',
      lat: placeC.lat, lng: placeC.lng,
      detourMin, fromStartMin,
      ...(sw8type && { _sw8type: sw8type }),
      ...(isCT1 && { _ct1: true }),
      ...(isDessert && { _dessert: true }),
    });
    return true;
  };

  // 1라운드: 기본 탐색
  for (const cat of cats) {
    const catCode = cat.cat;
    const points = getCatPoints(catCode);
    for (const point of points) {
      let data;
      if (cat._keyword) {
        // SW8 키워드 병행 검색 (기차역, 버스터미널)
        data = await psKeyword(cat._keyword, point, effectiveRadius);
      } else {
        data = await psSearch(catCode, point, effectiveRadius);
        if (data?._error === 'KAKAO_QUOTA') throw new Error('KAKAO_QUOTA');
      }
      let pointCount = 0;
      for (const p of data) {
        if (pointCount >= maxPerPoint) break;
        const sw8type = cat._keyword ? (cat._keyword === '기차역' ? 'train' : 'bus') : cat._sw8sw ? 'subway' : null;
        const added = addResult(p, cat, sw8type, cat._ct1 || false, cat._dessert || false);
        if (added) pointCount++;
      }
    }
  }

  // 2라운드 채우기: 결과가 5개 미만인 카테고리에 대해 반경 2배로 재탐색
  const resultsByCat = {};
  results.forEach(r => { (resultsByCat[r.catCode] = resultsByCat[r.catCode] || []).push(r); });

  for (const cat of cats) {
    const catCode = cat._ct1 ? 'AT4' : cat.cat;
    const catResults = resultsByCat[catCode] || [];
    if (catResults.length >= 5) continue;
    const cfg = CAT_SEARCH_CONFIG[catCode] || {};
    if (!cfg.autoExpand) continue;
    const expandRadius = effectiveRadius * 2;
    const points = getCatPoints(catCode);
    for (const point of points) {
      let data;
      if (cat._keyword) {
        data = await psKeyword(cat._keyword, point, expandRadius);
      } else {
        data = await psSearch(catCode, point, expandRadius);
        if (data?._error === 'KAKAO_QUOTA') throw new Error('KAKAO_QUOTA');
      }
      for (const p of data) {
        const sw8type = cat._keyword ? (cat._keyword === '기차역' ? 'train' : 'bus') : null;
        addResult(p, cat, sw8type, cat._ct1 || false, cat._dessert || false);
      }
    }
    // 확장 후에도 결과 없으면 멘트 표시
    const afterExpand = results.filter(r => r.catCode === catCode);
    if (afterExpand.length === 0 && cfg.msg) {
      showToast('⚠️ ' + cfg.msg);
    }
  }

  // v4.2.17: 초기 정렬은 detourMin 기준 (fromStartMin 추정값 부정확)
  // 백그라운드 API 완료 후 fromStartMin(실API) 기준으로 재정렬
  results.forEach(r => { r.detourExact = false; });
  const filtered = results.filter(r => r.detourMin <= maxDetourMin * 1.5);
  filtered.sort((a, b) => a.fromStartMin - b.fromStartMin || a.detourMin - b.detourMin);

  // 백그라운드에서 이탈시간 정확값 계산 후 숫자만 조용히 업데이트 (깜박임 없음)
  const _startC = startC, _endC = endC, _totalSec = totalSec;
  setTimeout(async () => {
    try {
      await calcDetourMinBatch(_startC, _endC, filtered, _totalSec);
      filtered.forEach(r => { if (r.detourExact == null) r.detourExact = false; });
      // fromStartMin 기준으로 filtered 배열 재정렬
      filtered.sort((a, b) => {
        if (a.detourExact && b.detourExact) return a.fromStartMin - b.fromStartMin || a.detourMin - b.detourMin;
        if (a.detourExact) return -1;
        if (b.detourExact) return 1;
        return a.fromStartMin - b.fromStartMin || a.detourMin - b.detourMin;
      });
      // searchResult.places도 같은 순서로 업데이트 (탭 전환 시 순서 유지)
      if (searchResult) searchResult.places = [...filtered];
      // DOM 재정렬 (주유소 저가순 상태면 건너뜀)
      const sheet = document.getElementById('resultList');
      if (sheet && !(currentSingleCat === 'OL7' && ol7SortByPrice)) {
        const order = {};
        filtered.forEach((r, i) => { order[r.id] = i; });
        const cards = Array.from(sheet.querySelectorAll('.result-card'));
        cards.sort((a, b) => (order[a.dataset.id] ?? 999) - (order[b.dataset.id] ?? 999));
        cards.forEach(c => sheet.appendChild(c));
      }
      // 이탈시간 초과된 카드만 숨기고, 나머지는 숫자만 업데이트 (리렌더 없음)
      filtered.forEach(r => {
        const el = document.getElementById('detour-' + r.id);
        if (!el) return;
        const card = el.closest('.result-card');
        if (!card) return;
        if (r.detourExact && r.detourMin > maxDetourMin) {
          card.style.display = 'none'; // 정확값 기준 초과 시 조용히 숨김
        } else {
          const fsEl = document.getElementById('fromstart-' + r.id);
          if (fsEl) fsEl.textContent = '🕐 출발지에서 ' + r.fromStartMin + '분';
        }
      });
      // sheetCount 업데이트
      if (searchResult) {
        const visibleCount = filtered.filter(r => !r.detourExact || r.detourMin <= maxDetourMin).length;
        document.getElementById('sheetCount').textContent = visibleCount + '곳 발견';
        searchResult.places = filtered.filter(r => !r.detourExact || r.detourMin <= maxDetourMin);
      }
    } catch(e) {
      // 실패 시 추정값 유지, 아무것도 안 함
    }
  }, 100);

  return filtered;
}

// 공급사 코드 맵
const POLL_DIV_MAP = {
  SKE:'SK', GSC:'GS', SOL:'S-OIL', HDO:'HD', ETC:'자영',
  RTO:'알뜰', RTX:'알뜰(ex)', NHO:'알뜰(NH)',
  E1G:'E1', SKG:'SK가스', RTN:'알뜰(NH)'
};
const OPINET_PROXY = 'https://dropby-proxy.algoventus.workers.dev';
function showOilLoading(show) {
  const bar = document.getElementById('oilLoadingBar');
  if (bar) bar.style.display = show ? 'flex' : 'none';
}
const DROWSY_KEY = '1HW17T53FO23BH9E';



function applyOpinetMatching(ol7Places, allOilData) {
  if (!allOilData.length) return;
  const deg = Math.PI / 180;
  const a = 6378137.0, f = 1/298.257222101, e2 = 2*f-f*f;
  const ab = a-739.845, fb = f+0.000010037483;
  const e2b = 1-(ab*(1-fb))**2/ab**2;
  const wgs84ToTm128 = (lat, lng) => {
    const latR=lat*deg, lngR=lng*deg;
    const N=a/Math.sqrt(1-e2*Math.sin(latR)**2);
    let X=N*Math.cos(latR)*Math.cos(lngR)-146.43;
    let Y=N*Math.cos(latR)*Math.sin(lngR)+507.89;
    let Z=N*(1-e2)*Math.sin(latR)+681.46;
    const p=Math.sqrt(X*X+Y*Y);
    let latB=Math.atan2(Z,p*(1-e2b));
    for(let i=0;i<10;i++){const Nb=ab/Math.sqrt(1-e2b*Math.sin(latB)**2);latB=Math.atan2(Z+e2b*Nb*Math.sin(latB),p);}
    const lngB=Math.atan2(Y,X);
    const lat0=38*deg,lng0=128*deg,k0=0.9999,FE=400000,FN=600000;
    const e4b=e2b*e2b,e6b=e2b**3;
    const M=(phi)=>ab*((1-e2b/4-3*e4b/64-5*e6b/256)*phi-(3*e2b/8+3*e4b/32+45*e6b/1024)*Math.sin(2*phi)+(15*e4b/256+45*e6b/1024)*Math.sin(4*phi)-(35*e6b/3072)*Math.sin(6*phi));
    const sL=Math.sin(latB),cL=Math.cos(latB),tL=Math.tan(latB);
    const NB=ab/Math.sqrt(1-e2b*sL*sL),T=tL*tL,C=e2b/(1-e2b)*cL*cL,A=(lngB-lng0)*cL;
    return { x: k0*NB*(A+(1-T+C)*A**3/6+(5-18*T+T*T+72*C)*A**5/120)+FE,
             y: k0*(M(latB)-M(lat0)+NB*tL*(A*A/2+(5-T+9*C+4*C*C)*A**4/24+(61-58*T+T*T+600*C)*A**6/720))+FN };
  };
  const oilList = allOilData
    .filter(s => s.PRICE && s.GIS_X_COOR && s.GIS_Y_COOR)
    .map(s => ({ price: Number(s.PRICE), tmX: parseFloat(s.GIS_X_COOR), tmY: parseFloat(s.GIS_Y_COOR), pollDiv: s.POLL_DIV_CD||'' }));
  ol7Places.forEach(p => {
    const isLpgStation = /LPG|충전소/.test(p.catName);
    if (ol7FuelType === 'K015' && !isLpgStation) return;
    if (ol7FuelType !== 'K015' && isLpgStation) return;
    const tm = wgs84ToTm128(p.lat, p.lng);
    const tmX = tm.x + 367, tmY = tm.y - 617;
    const nearby = oilList
      .map(o => ({ o, dist: Math.sqrt((tmX-o.tmX)**2+(tmY-o.tmY)**2) }))
      .filter(x => x.dist < 200)
      .sort((a,b) => a.dist-b.dist);
    if (nearby[0]) { p._oilPrice = nearby[0].o.price; p._oilType = 'regular'; p._pollDiv = nearby[0].o.pollDiv; }
  });
}

// 유종 변경 시 오피넷 재조회
async function reloadOpinetPrices(places) {
  const ol7Places = places.filter(p => p.catCode === 'OL7');
  if (ol7Places.length === 0) return;
  // 기존 가격 초기화
  ol7Places.forEach(p => { delete p._oilPrice; delete p._oilType; });
  showOilLoading(true);
  await new Promise(r => setTimeout(r, 30)); // DOM 업데이트 대기
  const allOilData = [];
  const usedPoints = [];
  const callPoints = [];
  for (const p of ol7Places) {
    const tooClose = usedPoints.some(u => Math.sqrt((p.lat-u.lat)**2+(p.lng-u.lng)**2)*111 < 4);
    if (!tooClose) { usedPoints.push({lat:p.lat,lng:p.lng}); callPoints.push({lat:p.lat,lng:p.lng}); }
  }
  const lastPlace = ol7Places[ol7Places.length-1];
  if (lastPlace && !usedPoints.some(u => Math.sqrt((lastPlace.lat-u.lat)**2+(lastPlace.lng-u.lng)**2)*111 < 4)) {
    callPoints.push({lat:lastPlace.lat,lng:lastPlace.lng});
  }
  for (const pt of callPoints.slice(0,12)) {
    const data = await fetchOpinetPrices(pt.lat, pt.lng, 5, ol7FuelType);
    if (data?._error === 'OPINET_QUOTA') { showToast('⚠️ 오늘 유가 정보 이용 한도를 초과했어요. 내일 다시 이용해주세요.'); break; }
    if (Array.isArray(data)) allOilData.push(...data);
  }
  applyOpinetMatching(ol7Places, allOilData);
  showOilLoading(false);
  // 유종 변경 후 마커 다시 그리기
  if (searchResult) drawPlaceMarkers(searchResult.places);
}
async function fetchOpinetPrices(lat, lng, radius = 5, prodcd = 'B027') {
  try {
    const url = `${OPINET_PROXY}/?lat=${lat}&lng=${lng}&radius=${radius * 1000}&prodcd=${prodcd}`;
    const res = await fetch(url);
    if (res.status === 429 || res.status === 503) return { _error: 'OPINET_QUOTA' };
    if (!res.ok) return null;
    const data = await res.json();
    return data?.RESULT?.OIL || null;
  } catch(e) { return null; }
}

// v4.2.17: 졸음쉼터 조회 (경로 2시간 초과 시)
async function fetchDrowsyStations(routeCoords, totalSec) {
  if (totalSec < 7200) return null; // 2시간 미만 → 미표시
  try {
    const url = `https://www.safemap.go.kr/V2/api/DSSP-IF-00096?serviceKey=${DROWSY_KEY}&pageNo=1&numOfRows=100&type=json`;
    const res = await fetch(url);
    if (!res.ok) return null;
    const data = await res.json();
    const items = data?.body?.items || [];
    // 경로 2km 이내 필터
    return items.filter(item => {
      const pt = { lat: parseFloat(item.latitude), lng: parseFloat(item.longitude) };
      return distToRoute(pt, routeCoords) <= 2;
    });
  } catch(e) { return null; }
}
